controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/viren070/aiostreams
          tag: latest
          pullPolicy: IfNotPresent
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: aiostreams-secrets
              key: SECRET_KEY
        - name: BASE_URL
          valueFrom:
            secretKeyRef:
              name: aiostreams-secrets
              key: BASE_URL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 3000
              initialDelaySeconds: 15
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 3000
              initialDelaySeconds: 5
    type: deployment
persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: longhorn
    globalMounts:
    - path: /data
service:
  main:
    controller: main
    type: LoadBalancer
    loadBalancerIP: 192.168.20.222
    ports:
      http:
        port: 3000
