apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotify
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: gotify=ghcr.io/gotify/server
    argocd-image-updater.argoproj.io/gotify.update-strategy: semver
    argocd-image-updater.argoproj.io/gotify.helm.image-spec: controllers.main.containers.main.image
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: private
  sources:
  - repoURL: https://pmoscode-helm.github.io/gotify/
    chart: gotify
    targetRevision: 0.8.1
    helm:
      valueFiles:
      - $values/apps/private/gotify/values.yaml
  - repoURL: https://github.com/bananamaker123/homelab-k8s.git
    targetRevision: HEAD
    ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
