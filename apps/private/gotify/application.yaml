---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotify
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: private
  sources:
    - repoURL: https://pmoscode-helm.github.io/gotify/
      chart: gotify
      targetRevision: "0.8.1"
      helm:
        valueFiles:
          - $values/apps/private/gotify/values.yaml
    - repoURL: https://github.com/bananamaker123/homelab-k8s.git
      targetRevision: HEAD
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
