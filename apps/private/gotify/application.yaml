apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotify
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://pmoscode-helm.github.io/gotify
    chart: gotify
    targetRevision: 0.5.0
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: private
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
