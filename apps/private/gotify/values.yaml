controllers:
  main:
    containers:
      main:
        image:
          repository: gotify/server
          tag: "2.6.1"
          pullPolicy: IfNotPresent
        env:
          GOTIFY_SERVER_PORT: "80"
          GOTIFY_DEFAULTUSER_NAME: "admin"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 80
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 80
              initialDelaySeconds: 10

service:
  main:
    controller: main
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: 192.168.20.214
    allocateLoadBalancerNodePorts: false
    ports:
      http:
        port: 80

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: longhorn
    globalMounts:
    - path: /app/data
