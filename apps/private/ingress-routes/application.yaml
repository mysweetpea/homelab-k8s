---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: private-ingress-routes
  namespace: argocd
  labels:
    app: private-ingress-routes
spec:
  project: default
  source:
    repoURL: https://github.com/mysweetpea/homelab-k8s.git
    targetRevision: HEAD
    path: apps/private/ingress-routes
  destination:
    server: https://kubernetes.default.svc
    namespace: private
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
