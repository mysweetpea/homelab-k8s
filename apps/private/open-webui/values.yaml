controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/open-webui/open-webui
          tag: "latest"
          pullPolicy: IfNotPresent
        env:
          OLLAMA_BASE_URL: http://ollama.dmz.svc.cluster.local:11434
          WEBUI_PORT: "8080"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 10

service:
  main:
    controller: main
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.20.226"
    allocateLoadBalancerNodePorts: false
    ports:
      http:
        port: 8080

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: longhorn
    globalMounts:
    - path: /app/backend/data
