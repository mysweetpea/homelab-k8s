apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustdesk-hbbs
  namespace: private
  labels:
    app: rustdesk-hbbs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustdesk-hbbs
  template:
    metadata:
      labels:
        app: rustdesk-hbbs
    spec:
      containers:
      - name: hbbs
        image: rustdesk/rustdesk-server:latest
        command: ["hbbs"]
        ports:
        - containerPort: 21115
          protocol: TCP
        - containerPort: 21116
          protocol: TCP
        - containerPort: 21116
          protocol: UDP
        - containerPort: 21118
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /root
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rustdesk-data-lh
---
apiVersion: v1
kind: Service
metadata:
  name: rustdesk-hbbs
  namespace: private
  annotations:
    metallb.universe.tf/allow-shared-ip: "rustdesk"
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.20.216
  allocateLoadBalancerNodePorts: false
  selector:
    app: rustdesk-hbbs
  ports:
  - name: nat-test
    port: 21115
    targetPort: 21115
    protocol: TCP
  - name: registration-tcp
    port: 21116
    targetPort: 21116
    protocol: TCP
  - name: registration-udp
    port: 21116
    targetPort: 21116
    protocol: UDP
  - name: web-client
    port: 21118
    targetPort: 21118
    protocol: TCP
