controllers:
  main:
    containers:
      main:
        image:
          repository: rustdesk/rustdesk-server
          tag: latest
    type: deployment
persistence:
  data:
    existingClaim: rustdesk-data-lh
service:
  main:
    controller: main
    ports:
      hbbr:
        port: 21116
      hbbs:
        port: 21115
      relay:
        port: 21117
    type: LoadBalancer
    loadBalancerIP: 192.168.20.216
    allocateLoadBalancerNodePorts: false
