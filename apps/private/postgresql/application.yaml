apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '1'
    argocd-image-updater.argoproj.io/image-list: postgresql=docker.io/bitnami/postgresql
    argocd-image-updater.argoproj.io/postgresql.update-strategy: semver
    argocd-image-updater.argoproj.io/postgresql.helm.image-spec: image
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: private
  sources:
  - repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 18.7.0
    helm:
      valueFiles:
      - $values/apps/private/postgresql/values.yaml
  - repoURL: https://github.com/bananamaker123/homelab-k8s.git
    targetRevision: HEAD
    ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
