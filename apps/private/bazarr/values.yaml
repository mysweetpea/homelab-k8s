controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/hotio/bazarr
          tag: latest
    type: deployment
persistence:
  config:
    existingClaim: bazarr-lh
service:
  main:
    controller: main
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.20.223"
    allocateLoadBalancerNodePorts: false
    ports:
      http:
        port: 6767
