apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich-postgresql
  namespace: private
  labels:
    app.kubernetes.io/name: immich-postgresql
spec:
  serviceName: immich-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-postgresql
    spec:
      initContainers:
        - name: clean-mount
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Removing lost+found from mount point..."
              rm -rf /var/lib/postgresql/data/lost+found 2>/dev/null || true
              echo "Done. Mount point is clean."
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgresql
          image: ghcr.io/immich-app/postgres:17-vectorchord0.4.3-pgvectors0.3.0
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: immich
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-postgresql
                  key: postgres-password
            - name: POSTGRES_DB
              value: immich
            - name: DB_STORAGE_TYPE
              value: SSD
          ports:
            - containerPort: 5432
              name: postgresql
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "immich", "-d", "immich"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: longhorn
            resources:
              requests:
                storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: immich-postgresql
  namespace: private
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: immich-postgresql
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
