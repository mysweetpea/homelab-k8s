apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: nextcloud=docker.io/nextcloud
    argocd-image-updater.argoproj.io/nextcloud.update-strategy: semver
    argocd-image-updater.argoproj.io/nextcloud.helm.image-spec: controllers.main.containers.main.image
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: private
  sources:
  - repoURL: https://nextcloud.github.io/helm
    chart: nextcloud
    targetRevision: 9.1.0
    helm:
      valueFiles:
      - $values/apps/private/nextcloud/values.yaml
  - repoURL: https://github.com/bananamaker123/homelab-k8s.git
    targetRevision: HEAD
    ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
