---
controllers:
  main:
    containers:
      main:
        env:
          DB_POSTGRESDB_DATABASE: n8n
          DB_POSTGRESDB_HOST: postgresql.private.svc.cluster.local
          DB_POSTGRESDB_PORT: "5432"
          DB_POSTGRESDB_USER: n8n
          DB_TYPE: postgresdb
          N8N_SECURE_COOKIE: "false"
          N8N_HOST: "n8n.mysweetpea.cc"
          WEBHOOK_URL: "https://n8n.mysweetpea.cc"
        envFrom:
          - secretRef:
              name: n8n-db-creds
        image:
          repository: n8nio/n8n
          tag: "2.28.2"
    type: deployment
persistence:
  data:
    accessMode: ReadWriteOnce
    enabled: true
    size: 5Gi
    storageClass: longhorn
service:
  main:
    controller: main
    ports:
      http:
        port: 5678
