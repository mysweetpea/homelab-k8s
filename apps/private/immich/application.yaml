apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: immich
      repoURL: https://immich-app.github.io/immich-charts
      targetRevision: 0.12.0
      helm:
        valueFiles:
          - $values/apps/private/immich/values.yaml
    - ref: values
      repoURL: git@github.com:mysweetpea/homelab-k8s.git
      targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: private
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
