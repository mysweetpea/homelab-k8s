# immich chart 0.12.0 — bjw-s common library v4 format
controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: v1.119.0
        env:
          DB_HOSTNAME:
            value: immich-postgresql.private.svc.cluster.local
          DB_PORT:
            value: "5432"
          DB_DATABASE_NAME:
            value: immich
          DB_USERNAME:
            value: immich
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secrets
                key: DB_PASSWORD
          REDIS_HOSTNAME:
            value: redis-immich-master.private.svc.cluster.local
          REDIS_PORT:
            value: "6379"
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secrets
                key: REDIS_PASSWORD

service:
  main:
    ports:
      http:
        port: 2283

persistence:
  library:
    enabled: true
    type: persistentVolumeClaim
    storageClassName: longhorn
    accessMode: ReadWriteOnce
    size: 100Gi
    globalMounts:
      - path: /data
