apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: homelab-image-updater
  namespace: argocd
spec:
  writeBackConfig:
    method: git
    gitConfig:
      repository: https://github.com/mysweetpea/homelab-k8s.git
      branch: main
  applicationRefs:
    # ── Existing (4 apps) ──
    - namePattern: n8n
      images:
      - alias: n8n
        imageName: n8nio/n8n
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^2\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: immich
      images:
      - alias: immich
        imageName: ghcr.io/immich-app/immich-server
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: homepage
      images:
      - alias: homepage
        imageName: ghcr.io/gethomepage/homepage
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: jellyfin
      images:
      - alias: jellyfin
        imageName: jellyfin/jellyfin
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    # ─ Other bjw-s app-template charts ──
    - namePattern: flaresolverr
      images:
      - alias: flaresolverr
        imageName: ghcr.io/flaresolverr/flaresolverr
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: searxng
      images:
      - alias: searxng
        imageName: docker.io/searxng/searxng
        commonUpdateSettings:
          updateStrategy: latest
          allowTags: "latest"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: seerr
      images:
      - alias: seerr
        imageName: ghcr.io/fallenbagel/jellyseerr
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: ollama
      images:
      - alias: ollama
        imageName: docker.io/ollama/ollama
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    # ── Non-bjw-s Helm charts ──
    - namePattern: authentik
      images:
      - alias: authentik
        imageName: ghcr.io/goauthentik/server
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^20\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: authentik.image.tag
    - namePattern: nextcloud
      images:
      - alias: nextcloud
        imageName: docker.io/nextcloud
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: image.tag
    - namePattern: vaultwarden
      images:
      - alias: vaultwarden
        imageName: ghcr.io/dani-garcia/vaultwarden
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^1\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: qdrant
      images:
      - alias: qdrant
        imageName: docker.io/qdrant/qdrant
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: uptime-kuma
      images:
      - alias: uptimekuma
        imageName: docker.io/louislam/uptime-kuma
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: element-web
      images:
      - alias: elementweb
        imageName: docker.io/vectorim/element-web
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
