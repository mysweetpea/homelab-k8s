      - alias: nextcloud
        imageName: docker.io/nextcloud
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: image.tag
    - namePattern: vaultwarden
      images:
      - alias: vaultwarden
        imageName: ghcr.io/dani-garcia/vaultwarden
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^1\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: qdrant
      images:
      - alias: qdrant
        imageName: docker.io/qdrant/qdrant
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: uptime-kuma
      images:
      - alias: uptimekuma
        imageName: docker.io/louislam/uptime-kuma
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag    # ── Newly converted from raw manifests ──
    - namePattern: gotify
      images:
      - alias: gotify
        imageName: gotify/server
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^2\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: open-webui
      images:
      - alias: openwebui
        imageName: ghcr.io/open-webui/open-webui
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: cloudflared
      images:
      - alias: cloudflared
        imageName: cloudflare/cloudflared
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^2026\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: rustdesk
      images:
      - alias: rustdesk
        imageName: rustdesk/rustdesk-server
        commonUpdateSettings:
          updateStrategy: newest-build
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+"
        manifestTargets:
          helm:
            tag: controllers.hbbs.containers.main.image.tag
    - namePattern: affine
      images:
      - alias: affine
        imageName: ghcr.io/toeverything/affine
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: element-web
      images:
      - alias: elementweb
        imageName: docker.io/vectorim/element-web
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag

