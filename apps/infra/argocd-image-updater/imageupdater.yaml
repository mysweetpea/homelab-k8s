apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: homelab-image-updater
  namespace: argocd
spec:
  writeBackConfig:
    method: git
    gitConfig:
      repository: https://github.com/mysweetpea/homelab-k8s.git
      branch: main
  applicationRefs:
    # ── Existing (4 apps) ──
    - namePattern: n8n
      images:
      - alias: n8n
        imageName: n8nio/n8n
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^2\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: immich
      images:
      - alias: immich
        imageName: ghcr.io/immich-app/immich-server
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: homepage
      images:
      - alias: homepage
        imageName: ghcr.io/gethomepage/homepage
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: jellyfin
      images:
      - alias: jellyfin
        imageName: jellyfin/jellyfin
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    # ── hotio images (GHCR, tag format: release-6.2.1.10461) ──
    - namePattern: radarr
      images:
      - alias: radarr
        imageName: ghcr.io/hotio/radarr
        commonUpdateSettings:
          updateStrategy: newest-build
          allowTags: "regexp:^release-\\d+\\.\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: sonarr
      images:
      - alias: sonarr
        imageName: ghcr.io/hotio/sonarr
        commonUpdateSettings:
          updateStrategy: newest-build
          allowTags: "regexp:^release-\\d+\\.\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: bazarr
      images:
      - alias: bazarr
        imageName: ghcr.io/hotio/bazarr
        commonUpdateSettings:
          updateStrategy: newest-build
          allowTags: "regexp:^release-\\d+\\.\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: prowlarr
      images:
      - alias: prowlarr
        imageName: ghcr.io/hotio/prowlarr
        commonUpdateSettings:
          updateStrategy: newest-build
          allowTags: "regexp:^release-\\d+\\.\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: qbittorrent
      images:
      - alias: qbittorrent
        imageName: ghcr.io/hotio/qbittorrent
        commonUpdateSettings:
          updateStrategy: newest-build
          allowTags: "regexp:^release-\\d+\\.\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    # ── Other bjw-s app-template charts ──
    - namePattern: flaresolverr
      images:
      - alias: flaresolverr
        imageName: ghcr.io/flaresolverr/flaresolverr
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: searxng
      images:
      - alias: searxng
        imageName: docker.io/searxng/searxng
        commonUpdateSettings:
          updateStrategy: newest-build
          allowTags: "regexp:^\\d+\\.\\d+\\.\\d+"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: seerr
      images:
      - alias: seerr
        imageName: ghcr.io/fallenbagel/jellyseerr
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    - namePattern: ollama
      images:
      - alias: ollama
        imageName: docker.io/ollama/ollama
        commonUpdateSettings:
          updateStrategy: semver
          allowTags: "regexp:^v\\d+\\.\\d+\\.\\d+$"
        manifestTargets:
          helm:
            tag: controllers.main.containers.main.image.tag
    # ── Non-bjw-s Helm charts ──
    - namePattern: authentik
      images:
      - alias: authentik
        imageName: ghcr.io/goauthentik/server
