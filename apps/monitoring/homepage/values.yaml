---
controllers:
  main:
    initContainers:
      config-copy:
        image:
          repository: alpine
          tag: latest
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            cp /templates/* /app/config/
    containers:
      main:
        env:
          HOMEPAGE_ALLOWED_HOSTS: "192.168.20.211:3000,homepage.mysweetpea.cc"
        envFrom:
          - secretRef:
              name: homepage-secrets
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.13.2
    type: deployment
persistence:
  templates:
    enabled: true
    type: configMap
    name: homepage-templates
    globalMounts:
      - path: /templates
  config:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config
  logo:
    enabled: true
    type: configMap
    name: sweetpea-logo
    advancedMounts:
      main:
        main:
          - path: /app/public/logo.svg
            subPath: logo.svg
  logs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config/logs
service:
  main:
    controller: main
    ports:
      http:
        port: 3000
    type: LoadBalancer
    loadBalancerIP: 192.168.20.211
    allocateLoadBalancerNodePorts: false
