---
controllers:
  main:
    initContainers:
      config-merge:
        image:
          repository: alpine
          tag: latest
        command:
          - sh
          - -c
          - |
            apk add --no-cache gettext envsubst
            mkdir -p /app/config
            cp /templates/* /app/config/
            for f in /app/config/*.yaml; do
              envsubst < "$f" > "$f.tmp"
              mv "$f.tmp" "$f"
            done
            if [ -f /logo/logo.svg ]; then
              mkdir -p /app/public
              cp /logo/logo.svg /app/public/logo.svg
            fi
        envFrom:
          - secretRef:
              name: homepage-secrets
    containers:
      main:
        env:
          HOMEPAGE_ALLOWED_HOSTS: "192.168.20.211:3000,homepage.mysweetpea.cc"
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.13.2
    type: deployment
persistence:
  templates:
    enabled: true
    type: configMap
    name: homepage-templates
    globalMounts:
      - path: /templates
  logo:
    enabled: true
    type: configMap
    name: sweetpea-logo
    globalMounts:
      - path: /logo
  merged:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config
  logs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config/logs
service:
  main:
    controller: main
    ports:
      http:
        port: 3000
    type: LoadBalancer
    loadBalancerIP: 192.168.20.211
    allocateLoadBalancerNodePorts: false
