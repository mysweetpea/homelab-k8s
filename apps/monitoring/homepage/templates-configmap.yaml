---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-templates
  namespace: monitoring
data:
  settings.yaml: |
    title: SweetPea Homelab
    description: A self-hosted sanctuary
    headerStyle: boxedWidgets
    theme: dark
    color: slate
    iconStyle: theme
    target: _blank
    fullWidth: true
    disableCollapse: true
    useEqualHeights: true
    statusStyle: dot
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo
    layout:
      Info Widgets:
        tab: 🏠 Public
        header: false
        style: row
        columns: 4
      Public Services:
        tab: 🏠 Public
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Media:
        tab: 🎬 Media
        icon: sh-mediathekview
        style: row
        columns: 2
      Arr Stack:
        tab: 🎬 Media
        icon: sh-quickstack
        style: row
        columns: 4
      Private:
        tab: 🔒 Private
        icon: mdi-shield-lock-outline
        style: row
        columns: 4
      Infrastructure:
        tab: ⚙️ System
        icon: sh-linux-containers-lxc
        style: row
        columns: 4
      Monitoring:
        tab: ⚙️ System
        icon: sh-mozilla-monitor
        style: row
        columns: 3
      Coming Soon:
        tab: 🚀 Coming Soon
        icon: mdi-rocket-launch
        style: row
        columns: 4

  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/mysweetpea
        - ArgoCD:
            - abbr: AR
              href: http://192.168.20.220
        - Traefik:
            - abbr: TR
              href: http://192.168.20.210:8080
        - Uptime Kuma:
            - abbr: UK
              href: http://192.168.20.217:3001
    - Resources:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
        - Helm Docs:
            - abbr: HL
              href: https://helm.sh/docs/

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  widgets.yaml: |
    - resources:
        backend: resources
        cpu: true
        memory: true
        expanded: true
        disk: /
    - search:
        provider: duckduckgo
        target: _blank
        focus: false

  custom.css: |
    /* ═══════════════════════════════════════════════════════════════
       SweetPea Homelab — Black & Gold Full-Screen Branch Navigation
       ═══════════════════════════════════════════════════════════════ */

    :root {
      --gold: #d4af37;
      --gold-light: #f0c75e;
      --gold-dark: #b8941f;
      --black: #050505;
      --black-light: #0a0a0a;
      --border: rgba(212, 175, 55, 0.15);
      --border-hover: rgba(212, 175, 55, 0.4);
    }

    /* ── Force Black Background Everywhere ── */
    html, body, #__next, #page_wrapper, #inner_wrapper, .container {
      background-color: #050505 !important;
      background-image: none !important;
      color: #f0f0f0 !important;
    }

    /* ── Hide Default Header & Tabs ── */
    .header, #tabs {
      display: none !important;
    }

    /* ── Stats Bar — Fixed at Top ── */
    #information-widgets {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 200 !important;
      background: rgba(5, 5, 5, 0.95) !important;
      backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 8px 24px !important;
      margin: 0 !important;
      border-radius: 0 !important;
    }

    #information-widgets .widget-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 2px 10px !important;
      margin: 0 !important;
    }

    .information-widget-resource div[style*="width"] {
      background: linear-gradient(90deg, #d4af37 0%, #f0c75e 50%, #d4af37 100%) !important;
      opacity: 0.5 !important;
      border-radius: 10px !important;
    }

    .information-widget-resource:nth-of-type(1) svg { color: #d4af37 !important; }
    .information-widget-resource:nth-of-type(2) svg { color: #f0c75e !important; }
    .information-widget-resource:nth-of-type(3) svg { color: #b8941f !important; }

    /* ── Container Padding ── */
    .container {
      padding-top: 60px !important;
    }

    /* ── Service Cards — Black & Gold ── */
    .service-card {
      background: rgba(15, 15, 15, 0.8) !important;
      border: 1px solid var(--border) !important;
      border-radius: 16px !important;
      transition: all 0.3s ease !important;
    }

    .service-card:hover {
      transform: translateY(-5px) !important;
      border-color: var(--border-hover) !important;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.12), 0 0 50px rgba(212, 175, 55, 0.08) !important;
    }

    .service-group-name, .bookmark-group-name {
      color: #b8941f !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.07em !important;
    }

    /* ── Bookmarks ── */
    li.bookmark a {
      background: rgba(212, 175, 55, 0.03) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
    }

    li.bookmark a:hover {
      background: rgba(212, 175, 55, 0.08) !important;
      border-color: var(--border-hover) !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.15); border-radius: 3px; }

    /* ── Branch Overlay — Full Screen Cover ── */
    #branch-overlay {
      position: fixed !important;
      inset: 0 !important;
      z-index: 9999 !important;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
        #050505 !important;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
    }

    #branch-overlay.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    #branch-content {
      position: relative;
      width: 100%;
      max-width: 2000px;
      height: 850px;
    }

    /* ── Branch SVG Lines — Gold Vines ── */
    #branch-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .branch-line {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 1500;
      stroke-dashoffset: 1500;
      animation: draw-line 2s ease forwards;
      opacity: 0.5;
      transition: all 0.3s ease;
    }

    .branch-line:nth-child(1) { animation-delay: 0.3s; }
    .branch-line:nth-child(2) { animation-delay: 0.5s; }
    .branch-line:nth-child(3) { animation-delay: 0.7s; }
    .branch-line:nth-child(4) { animation-delay: 0.9s; }
    .branch-line:nth-child(5) { animation-delay: 1.1s; }

    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }

    .branch-line.active {
      stroke: var(--gold);
      stroke-width: 3.5;
      opacity: 1;
      filter: drop-shadow(0 0 14px rgba(212, 175, 55, 0.7));
    }

    /* ── Vine Leaves ── */
    .vine-leaf {
      fill: var(--gold-dark);
      opacity: 0;
      animation: leaf-appear 1s ease forwards;
    }

    .vine-leaf:nth-child(6) { animation-delay: 2.2s; }
    .vine-leaf:nth-child(7) { animation-delay: 2.4s; }
    .vine-leaf:nth-child(8) { animation-delay: 2.6s; }
    .vine-leaf:nth-child(9) { animation-delay: 2.8s; }
    .vine-leaf:nth-child(10) { animation-delay: 3s; }
    .vine-leaf:nth-child(11) { animation-delay: 3.2s; }
    .vine-leaf:nth-child(12) { animation-delay: 3.4s; }
    .vine-leaf:nth-child(13) { animation-delay: 3.6s; }
    .vine-leaf:nth-child(14) { animation-delay: 3.8s; }
    .vine-leaf:nth-child(15) { animation-delay: 4s; }

    @keyframes leaf-appear {
      to { opacity: 0.3; }
    }

    /* ── Center Logo — Massive & Illuminated ── */
    #branch-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    #branch-logo img {
      height: 580px;
      width: auto;
      object-fit: contain;
      animation: pulse-gold 6s ease-in-out infinite;
    }

    @keyframes pulse-gold {
      0%, 100% {
        filter: drop-shadow(0 0 60px rgba(212, 175, 55, 0.5))
                drop-shadow(0 0 120px rgba(212, 175, 55, 0.2));
      }
      50% {
        filter: drop-shadow(0 0 90px rgba(212, 175, 55, 0.75))
                drop-shadow(0 0 180px rgba(212, 175, 55, 0.32));
      }
    }

    /* ── Branch Buttons with Elegant Gold Vine Border ── */
    .branch-btn-wrapper {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 4;
      opacity: 0;
      animation: fade-in-btn 0.6s ease forwards;
      animation-delay: 1.6s;
    }

    .branch-btn-wrapper:nth-of-type(2) { animation-delay: 1.7s; }
    .branch-btn-wrapper:nth-of-type(3) { animation-delay: 1.8s; }
    .branch-btn-wrapper:nth-of-type(4) { animation-delay: 1.9s; }
    .branch-btn-wrapper:nth-of-type(5) { animation-delay: 2s; }

    @keyframes fade-in-btn {
      to { opacity: 1; }
    }

    .branch-btn-vine {
      position: absolute;
      top: -16px;
      left: -16px;
      right: -16px;
      bottom: -16px;
      pointer-events: none;
      overflow: visible;
    }

    .branch-btn-vine path {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 1.5;
      opacity: 0.5;
      transition: all 0.3s ease;
    }

    .branch-btn-vine .vine-flower {
      fill: var(--gold-dark);
      opacity: 0.3;
      transition: all 0.3s ease;
    }

    .branch-btn-vine .vine-flower-small {
      fill: var(--gold-dark);
      opacity: 0.2;
      transition: all 0.3s ease;
    }

    .branch-btn-wrapper:hover .branch-btn-vine path {
      stroke: var(--gold);
      stroke-width: 2.5;
      opacity: 0.85;
      filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
    }

    .branch-btn-wrapper:hover .branch-btn-vine .vine-flower {
      fill: var(--gold);
      opacity: 0.6;
    }

    .branch-btn-wrapper:hover .branch-btn-vine .vine-flower-small {
      fill: var(--gold-light);
      opacity: 0.45;
    }

    .branch-btn {
      background: rgba(8, 8, 8, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 48px;
      color: #a0a0a0;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      display: block;
      position: relative;
      z-index: 2;
    }

    .branch-btn-wrapper:hover .branch-btn {
      background: rgba(212, 175, 55, 0.1);
      border-color: var(--border-hover);
      color: var(--gold-light);
      box-shadow: 0 0 35px rgba(212, 175, 55, 0.18);
      transform: scale(1.06);
    }

    /* ── Back Button ── */
    #back-btn {
      position: fixed;
      top: 68px;
      left: 24px;
      z-index: 10000;
      background: rgba(8, 8, 8, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 22px;
      color: #a0a0a0;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      opacity: 0;
      transform: translateY(-10px);
    }

    #back-btn.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.3s ease 0.3s, transform 0.3s ease 0.3s;
    }

    #back-btn:hover {
      background: rgba(212, 175, 55, 0.1);
      border-color: var(--border-hover);
      color: var(--gold-light);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #branch-content {
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 40px 20px;
      }
      #branch-svg { display: none; }
      .branch-btn-wrapper {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        transform: none !important;
        width: 80%;
      }
      .branch-btn-wrapper:hover .branch-btn {
        transform: scale(1.02) !important;
      }
      #branch-logo img { height: 260px !important; }
      #back-btn { top: 64px; left: 12px; }
    }

  custom.js: |
    (function() {
      var initialized = false;

      function init() {
        if (initialized) return;
        initialized = true;

        // 1. Hide default header
        var header = document.querySelector('.header, [class*="header"]');
        if (header) header.style.display = 'none';

        // 2. Create particle canvas (gold dust)
        var canvas = document.createElement('canvas');
        canvas.id = 'particle-canvas';
        canvas.style.cssText = 'position:fixed;inset:0;z-index:9998;pointer-events:none;';
        document.body.prepend(canvas);
        var ctx = canvas.getContext('2d');
        var particles = [];
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        for (var i = 0; i < 40; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.8 + 0.2,
            vx: (Math.random() - 0.5) * 0.08,
            vy: (Math.random() - 0.5) * 0.08,
            o: Math.random() * 0.25 + 0.03
          });
        }
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(function(p) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(212,175,55,' + p.o + ')';
            ctx.fill();
          });
          requestAnimationFrame(animate);
        }
        animate();

        // 3. Create branch overlay
        var overlay = document.createElement('div');
        overlay.id = 'branch-overlay';

        function vineBorderSVG() {
          return '<svg class="branch-btn-vine" viewBox="0 0 260 90" preserveAspectRatio="none">' +
            '<path d="M 10 45 Q 14 14, 34 16 Q 56 9, 78 18 Q 100 7, 130 12 Q 160 7, 182 18 Q 204 9, 226 16 Q 246 14, 250 45 Q 246 76, 226 74 Q 204 81, 182 72 Q 160 83, 130 78 Q 100 83, 78 72 Q 56 81, 34 74 Q 14 76, 10 45 Z" />' +
            '<path d="M 18 45 Q 22 22, 38 24 Q 58 18, 78 26 Q 98 16, 130 20 Q 162 16, 182 26 Q 202 18, 222 24 Q 238 22, 242 45 Q 238 68, 222 66 Q 202 72, 182 64 Q 162 74, 130 70 Q 98 74, 78 64 Q 58 72, 38 66 Q 22 68, 18 45 Z" opacity="0.5" />' +
            '<circle class="vine-flower" cx="20" cy="20" r="4.5" />' +
            '<circle class="vine-flower" cx="130" cy="10" r="4" />' +
            '<circle class="vine-flower" cx="240" cy="20" r="4.5" />' +
            '<circle class="vine-flower" cx="20" cy="70" r="4" />' +
            '<circle class="vine-flower" cx="130" cy="80" r="4.5" />' +
            '<circle class="vine-flower" cx="240" cy="70" r="4" />' +
            '<ellipse class="vine-flower-small" cx="48" cy="16" rx="5" ry="2.5" transform="rotate(-30 48 16)" />' +
            '<ellipse class="vine-flower-small" cx="88" cy="14" rx="5" ry="2.5" transform="rotate(20 88 14)" />' +
            '<ellipse class="vine-flower-small" cx="172" cy="14" rx="5" ry="2.5" transform="rotate(-20 172 14)" />' +
            '<ellipse class="vine-flower-small" cx="212" cy="16" rx="5" ry="2.5" transform="rotate(30 212 16)" />' +
            '<ellipse class="vine-flower-small" cx="48" cy="74" rx="5" ry="2.5" transform="rotate(30 48 74)" />' +
            '<ellipse class="vine-flower-small" cx="88" cy="76" rx="5" ry="2.5" transform="rotate(-20 88 76)" />' +
            '<ellipse class="vine-flower-small" cx="172" cy="76" rx="5" ry="2.5" transform="rotate(20 172 76)" />' +
            '<ellipse class="vine-flower-small" cx="212" cy="74" rx="5" ry="2.5" transform="rotate(-30 212 74)" />' +
            '</svg>';
        }

        overlay.innerHTML =
          '<div id="branch-content">' +
            '<svg id="branch-svg" viewBox="0 0 2000 850" preserveAspectRatio="xMidYMid meet">' +
              '<path class="branch-line" d="M 1000 425 C 650 380, 420 290, 160 200" />' +
              '<path class="branch-line" d="M 1000 425 C 650 470, 420 560, 160 650" />' +
              '<path class="branch-line" d="M 1000 425 C 1350 370, 1580 250, 1840 160" />' +
              '<path class="branch-line" d="M 1000 425 C 1350 425, 1580 425, 1840 425" />' +
              '<path class="branch-line" d="M 1000 425 C 1350 480, 1580 600, 1840 690" />' +
              '<ellipse class="vine-leaf" cx="600" cy="375" rx="9" ry="4.5" transform="rotate(-25 600 375)" />' +
              '<ellipse class="vine-leaf" cx="420" cy="320" rx="8" ry="4" transform="rotate(-30 420 320)" />' +
              '<ellipse class="vine-leaf" cx="720" cy="475" rx="9" ry="4.5" transform="rotate(20 720 475)" />' +
              '<ellipse class="vine-leaf" cx="450" cy="545" rx="8" ry="4" transform="rotate(25 450 545)" />' +
              '<ellipse class="vine-leaf" cx="1300" cy="385" rx="9" ry="4.5" transform="rotate(20 1300 385)" />' +
              '<ellipse class="vine-leaf" cx="1530" cy="295" rx="8" ry="4" transform="rotate(30 1530 295)" />' +
              '<ellipse class="vine-leaf" cx="1370" cy="425" rx="8" ry="4" transform="rotate(-10 1370 425)" />' +
              '<ellipse class="vine-leaf" cx="1600" cy="425" rx="8" ry="4" transform="rotate(-5 1600 425)" />' +
              '<ellipse class="vine-leaf" cx="1340" cy="465" rx="9" ry="4.5" transform="rotate(-20 1340 465)" />' +
              '<ellipse class="vine-leaf" cx="1560" cy="565" rx="8" ry="4" transform="rotate(-25 1560 565)" />' +
            '</svg>' +
            '<div id="branch-logo">' +
              '<img src="https://raw.githubusercontent.com/mysweetpea/portfolio/main/workers/site/logo.svg" alt="SweetPea" />' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 8%; top: 23.5%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="0">Public</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 8%; top: 76.5%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="4">Coming Soon</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 92%; top: 18.8%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="1">Media</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 92%; top: 50%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="2">Private</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 92%; top: 81.2%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="3">System</button>' +
            '</div>' +
          '</div>';
        document.body.appendChild(overlay);

        // 4. Create back button
        var backBtn = document.createElement('button');
        backBtn.id = 'back-btn';
        backBtn.innerHTML = '\u2190 Back to Home';
        document.body.appendChild(backBtn);

        // 5. Branch line hover effects
        var branchLines = overlay.querySelectorAll('.branch-line');
        var branchBtnWrappers = overlay.querySelectorAll('.branch-btn-wrapper');

        branchBtnWrappers.forEach(function(wrapper, idx) {
          wrapper.addEventListener('mouseenter', function() {
            if (branchLines[idx]) branchLines[idx].classList.add('active');
          });
          wrapper.addEventListener('mouseleave', function() {
            if (branchLines[idx]) branchLines[idx].classList.remove('active');
          });
        });

        // 6. Branch button click — switch to service view
        branchBtnWrappers.forEach(function(wrapper) {
          var btn = wrapper.querySelector('.branch-btn');
          if (!btn) return;
          btn.addEventListener('click', function() {
            var tabIndex = parseInt(this.dataset.tabIndex);

            // Trigger the corresponding tab click
            var tabButtons = document.querySelectorAll('#tabs ul li button');
            if (tabButtons[tabIndex]) {
              tabButtons[tabIndex].click();
            }

            // Hide the branch overlay (slide up)
            overlay.classList.add('hidden');

            // Show back button
            setTimeout(function() {
              backBtn.classList.add('visible');
            }, 300);

            // Scroll to top
            window.scrollTo(0, 0);
          });
        });

        // 7. Back button click — return to branch view
        backBtn.addEventListener('click', function() {
          backBtn.classList.remove('visible');
          overlay.classList.remove('hidden');

          // Reset tab to first
          var tabButtons = document.querySelectorAll('#tabs ul li button');
          if (tabButtons[0]) {
            tabButtons[0].click();
          }
        });
      }

      // Wait for page load + hydration
      if (document.readyState === 'complete') {
        setTimeout(init, 1200);
      } else {
        window.addEventListener('load', function() {
          setTimeout(init, 1200);
        });
      }
    })();

  services.yaml: |
    - Public Services:
        - Jellyfin:
            id: jellyfin
            href: https://media.mysweetpea.cc
            description: Media Server
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons@main/svg/jellyfin.svg
            widget:
              type: jellyfin
              url: http://jellyfin.dmz.svc.cluster.local:8096
              key: ${JELLYFIN_API_KEY}
        - Seerr:
            id: seerr
            href: https://request.mysweetpea.cc
            description: Media Requests
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons@main/svg/overseerr.svg
