---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-templates
  namespace: monitoring
data:
  settings.yaml: |
    title: SweetPea Homelab
    description: A self-hosted sanctuary
    headerStyle: boxedWidgets
    theme: dark
    color: slate
    iconStyle: theme
    target: _blank
    fullWidth: true
    disableCollapse: true
    useEqualHeights: true
    statusStyle: dot
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo
    layout:
      Info Widgets:
        tab: 🏠 Public
        header: false
        style: row
        columns: 4
      Public Services:
        tab: 🏠 Public
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Media:
        tab: 🎬 Media
        icon: sh-mediathekview
        style: row
        columns: 2
      Arr Stack:
        tab: 🎬 Media
        icon: sh-quickstack
        style: row
        columns: 4
      Private:
        tab: 🔒 Private
        icon: mdi-shield-lock-outline
        style: row
        columns: 4
      Infrastructure:
        tab: ⚙️ System
        icon: sh-linux-containers-lxc
        style: row
        columns: 4
      Monitoring:
        tab: ⚙️ System
        icon: sh-mozilla-monitor
        style: row
        columns: 3
      Coming Soon:
        tab: 🚀 Coming Soon
        icon: mdi-rocket-launch
        style: row
        columns: 4

  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/mysweetpea
        - ArgoCD:
            - abbr: AR
              href: http://192.168.20.220
        - Traefik:
            - abbr: TR
              href: http://192.168.20.210:8080
        - Uptime Kuma:
            - abbr: UK
              href: http://192.168.20.217:3001
    - Resources:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
        - Helm Docs:
            - abbr: HL
              href: https://helm.sh/docs/

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  widgets.yaml: |
    - resources:
        backend: resources
        cpu: true
        memory: true
        expanded: true
        disk: /
    - search:
        provider: duckduckgo
        target: _blank
        focus: false

  custom.css: |
    :root {
      --gold: #d4af37;
      --gold-light: #f0c75e;
      --gold-dark: #b8941f;
      --border: rgba(212, 175, 55, 0.18);
      --border-hover: rgba(212, 175, 55, 0.55);
      --bg: #050505;
      --card-bg: rgba(18, 18, 18, 0.78);
    }

    html, body, #__next, #page_wrapper, #inner_wrapper, .container {
      background-color: var(--bg) !important;
      background-image: none !important;
      color: #f0f0f0 !important;
    }

    #petal-canvas {
      position: fixed !important;
      inset: 0 !important;
      z-index: 0 !important;
      pointer-events: none !important;
    }

    .header { display: none !important; }
    #tabs {
      position: fixed !important;
      top: -100px !important;
      left: -100px !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
      overflow: hidden !important;
      z-index: -1 !important;
    }

    #information-widgets {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 10001 !important;
      background: rgba(5, 5, 5, 0.85) !important;
      backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 10px 28px !important;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    body.service-active #information-widgets {
      opacity: 0 !important;
      transform: translateY(-100%);
      pointer-events: none !important;
    }

    .container {
      padding-top: 72px !important;
      position: relative;
      z-index: 1;
    }

    body.service-active .container {
      padding-top: 0 !important;
      min-height: 100vh !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
    }

    body.service-active .bookmark-group,
    body.service-active #footer {
      display: none !important;
    }

    .service-card {
      background: var(--card-bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 16px !important;
      transition: all 0.3s ease !important;
      backdrop-filter: blur(8px) !important;
    }

    .service-card:hover {
      transform: translateY(-5px) !important;
      border-color: var(--border-hover) !important;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 30px rgba(212,175,55,0.12) !important;
    }

    .service-group-name {
      color: var(--gold-dark) !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
    }

    #branch-overlay {
      position: fixed !important;
      inset: 0 !important;
      z-index: 9999 !important;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(212, 175, 55, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 85%, rgba(212, 175, 55, 0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 85% 15%, rgba(212, 175, 55, 0.06) 0%, transparent 40%),
        var(--bg) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
    }

    #branch-overlay.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    #branch-content {
      position: relative;
      width: min(90vw, 1000px);
      aspect-ratio: 1 / 1;
      max-height: 90vh;
    }

    #branch-vines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
    }

    .branch-line {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 0.6;
      stroke-linecap: round;
      opacity: 0.5;
      transition: all 0.3s ease;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw-line 1.5s ease forwards;
    }

    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }

    #branch-center {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    #branch-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 35%;
      height: 35%;
      z-index: 3;
      animation: logo-entrance 1s ease forwards;
    }

    #branch-logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 40px rgba(212,175,55,0.4));
      animation: pulse-gold 6s ease-in-out infinite;
    }

    @keyframes logo-entrance {
      0% { opacity: 0; transform: translate(-50%, -55%) scale(0.9); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes pulse-gold {
      0%, 100% { filter: drop-shadow(0 0 40px rgba(212,175,55,0.4)); }
      50% { filter: drop-shadow(0 0 70px rgba(212,175,55,0.7)); }
    }

    .branch-btn-wrapper {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 4;
      opacity: 0;
      animation: fade-in-btn 0.6s ease forwards;
    }

    @keyframes fade-in-btn {
      0% { opacity: 0; transform: translate(-50%, -40%); }
      100% { opacity: 1; transform: translate(-50%, -50%); }
    }

    .branch-btn {
      background: rgba(10, 10, 10, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 36px;
      color: #a8a8a8;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .branch-btn-wrapper:hover .branch-btn {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--border-hover);
      color: var(--gold-light);
      box-shadow: 0 0 35px rgba(212,175,55,0.2);
      transform: scale(1.05);
    }

    #back-btn {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 10000;
      background: rgba(10, 10, 10, 0.9);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 22px;
      color: #a8a8a8;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      opacity: 0;
    }

    #back-btn.visible {
      display: block;
      opacity: 1;
    }

    #back-btn:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--border-hover);
      color: var(--gold-light);
    }

    @media (max-width: 768px) {
      #branch-content {
        width: 100%;
        height: auto;
        aspect-ratio: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 40px 20px;
      }

      #branch-vines { display: none; }

      #branch-logo {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
        width: 180px;
        height: 180px;
        margin-bottom: 20px;
        animation: none;
      }

      .branch-btn-wrapper {
        position: relative !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
        width: 80%;
        animation: fade-in-btn-mobile 0.5s ease forwards;
      }

      @keyframes fade-in-btn-mobile {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .container { padding-top: 60px !important; }
    }

  custom.js: |
    console.log("SWEETPEA CUSTOM JS: file loaded");

    (function() {
      "use strict";

      var initialized = false;

      function log(msg) {
        console.log("[SweetPea Homepage]", msg);
      }

      function waitForHomepage(callback, attempts) {
        attempts = attempts || 0;
        if (document.querySelector(".container")) {
          callback();
        } else if (attempts < 50) {
          setTimeout(function() { waitForHomepage(callback, attempts + 1); }, 100);
        } else {
          log("ERROR: Homepage container never appeared");
        }
      }

      function init() {
        if (initialized) return;
        initialized = true;
        log("Starting initialization");

        try {
          var header = document.querySelector(".header");
          if (header) header.style.display = "none";

          var canvas = document.createElement("canvas");
          canvas.id = "petal-canvas";
          document.body.prepend(canvas);
          var ctx = canvas.getContext("2d");

          function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          }
          resizeCanvas();
          window.addEventListener("resize", resizeCanvas);

          var petals = [];
          var count = Math.min(70, Math.max(30, Math.floor((canvas.width * canvas.height) / 50000)));
          for (var i = 0; i < count; i++) {
            petals.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              size: Math.random() * 6 + 3,
              speedY: Math.random() * 1.0 + 0.3,
              speedX: (Math.random() - 0.5) * 0.6,
              rotation: Math.random() *Math.PI* 2,
              rotationSpeed: (Math.random() - 0.5) * 0.025,
              opacity: Math.random() * 0.35 + 0.15,
              sway: Math.random() * 0.02 + 0.005,
              swayOffset: Math.random() *Math.PI* 2
            });
          }
          log("Created " + count + " petals");

          var frame = 0;
          function animatePetals() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;
            for (var i = 0; i < petals.length; i++) {
              var p = petals[i];
              p.y += p.speedY;
              p.x += p.speedX + Math.sin(frame * p.sway + p.swayOffset) * 0.4;
              p.rotation += p.rotationSpeed;

              if (p.y > canvas.height + 30) {
                p.y = -30;
                p.x = Math.random() * canvas.width;
              }
              if (p.x < -30) p.x = canvas.width + 30;
              if (p.x > canvas.width + 30) p.x = -30;

              ctx.save();
              ctx.translate(p.x, p.y);
              ctx.rotate(p.rotation);
              ctx.globalAlpha = p.opacity;
              ctx.fillStyle = "#d4af37";
              ctx.beginPath();
              ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
            requestAnimationFrame(animatePetals);
          }
          animatePetals();

          var logoSvg =
            "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 200 200\">" +
              "<defs>" +
                "<linearGradient id=\"spGold\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">" +
                  "<stop offset=\"0%\" stop-color=\"#f0c75e\"/>" +
                  "<stop offset=\"100%\" stop-color=\"#b8941f\"/>" +
                "</linearGradient>" +
                "<filter id=\"spGlow\">" +
                  "<feGaussianBlur stdDeviation=\"4\" result=\"blur\"/>" +
                  "<feMerge><feMergeNode in=\"blur\"/><feMergeNode in=\"SourceGraphic\"/></feMerge>" +
                "</filter>" +
              "</defs>" +
              "<path d=\"M100,170 Q100,130 100,100\" stroke=\"#b8941f\" stroke-width=\"3\" fill=\"none\"/>" +
              "<path d=\"M100,150 Q75,130 70,145 Q85,160 100,150\" fill=\"#b8941f\" opacity=\"0.5\"/>" +
              "<path d=\"M100,130 Q125,110 130,125 Q115,140 100,130\" fill=\"#b8941f\" opacity=\"0.5\"/>" +
              "<path d=\"M100,100 C75,65 55,80 70,100 C80,115 100,105 100,100\" fill=\"url(#spGold)\" opacity=\"0.9\" filter=\"url(#spGlow)\"/>" +
              "<path d=\"M100,100 C125,65 145,80 130,100 C120,115 100,105 100,100\" fill=\"url(#spGold)\" opacity=\"0.9\" filter=\"url(#spGlow)\"/>" +
              "<path d=\"M100,100 C90,55 110,55 100,100\" fill=\"#f0c75e\" opacity=\"0.85\" filter=\"url(#spGlow)\"/>" +
              "<circle cx=\"100\" cy=\"100\" r=\"7\" fill=\"#f0c75e\"/>" +
            "</svg>";

          var overlay = document.createElement("div");
          overlay.id = "branch-overlay";

          overlay.innerHTML =
            "<div id=\"branch-content\">" +
              "<svg id=\"branch-vines\" viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\">" +
                "<path class=\"branch-line\" data-line-index=\"0\" style=\"animation-delay:0.3s\" d=\"M50,50 Q60,38 75,25\" />" +
                "<path class=\"branch-line\" data-line-index=\"1\" style=\"animation-delay:0.5s\" d=\"M50,50 Q38,50 25,50\" />" +
                "<path class=\"branch-line\" data-line-index=\"2\" style=\"animation-delay:0.7s\" d=\"M50,50 Q38,38 25,25\" />" +
                "<path class=\"branch-line\" data-line-index=\"3\" style=\"animation-delay:0.9s\" d=\"M50,50 Q38,62 25,75\" />" +
                "<path class=\"branch-line\" data-line-index=\"4\" style=\"animation-delay:1.1s\" d=\"M50,50 Q62,62 75,75\" />" +
              "</svg>" +
              "<div id=\"branch-center\">" +
                "<div id=\"branch-logo\">" + logoSvg + "</div>" +
                "<div class=\"branch-btn-wrapper\" data-tab-index=\"0\" style=\"top:25%;left:75%;animation-delay:1.3s\"><button class=\"branch-btn\">Public</button></div>" +
                "<div class=\"branch-btn-wrapper\" data-tab-index=\"1\" style=\"top:50%;left:25%;animation-delay:1.45s\"><button class=\"branch-btn\">Media</button></div>" +
                "<div class=\"branch-btn-wrapper\" data-tab-index=\"2\" style=\"top:25%;left:25%;animation-delay:1.6s\"><button class=\"branch-btn\">Private</button></div>" +
                "<div class=\"branch-btn-wrapper\" data-tab-index=\"3\" style=\"top:75%;left:25%;animation-delay:1.75s\"><button class=\"branch-btn\">System</button></div>" +
                "<div class=\"branch-btn-wrapper\" data-tab-index=\"4\" style=\"top:75%;left:75%;animation-delay:1.9s\"><button class=\"branch-btn\">Coming Soon</button></div>" +
              "</div>" +
            "</div>";
          document.body.appendChild(overlay);
          log("Overlay appended");

          var backBtn = document.createElement("button");
          backBtn.id = "back-btn";
          backBtn.innerHTML = "← Back to Home";
          document.body.appendChild(backBtn);

          var wrappers = overlay.querySelectorAll(".branch-btn-wrapper");
          wrappers.forEach(function(wrapper, idx) {
            var btn = wrapper.querySelector(".branch-btn");
            if (!btn) return;

            wrapper.addEventListener("mouseenter", function() {
              var line = document.querySelector("#branch-vines .branch-line[data-line-index=\"" + idx + "\"]");
              if (line) {
                line.style.stroke = "#d4af37";
                line.style.opacity = "0.9";
                line.style.filter = "drop-shadow(0 0 8px rgba(212,175,55,0.6))";
                line.style.strokeWidth = "0.9";
              }
            });
            wrapper.addEventListener("mouseleave", function() {
              var line = document.querySelector("#branch-vines .branch-line[data-line-index=\"" + idx + "\"]");
              if (line) {
                line.style.stroke = "";
                line.style.opacity = "";
                line.style.filter = "";
                line.style.strokeWidth = "";
              }
            });

            btn.addEventListener("click", function() {
              var tabIndex = parseInt(wrapper.dataset.tabIndex);
              var tabButtons = document.querySelectorAll("#tabs ul li button");
              log("Button clicked: tabIndex=" + tabIndex + ", tabs=" + tabButtons.length);
              if (tabButtons[tabIndex]) tabButtons[tabIndex].click();
              overlay.classList.add("hidden");
              document.body.classList.add("service-active");
              setTimeout(function() { backBtn.classList.add("visible"); }, 300);
              window.scrollTo(0, 0);
            });
          });

          backBtn.addEventListener("click", function() {
            backBtn.classList.remove("visible");
            overlay.classList.remove("hidden");
            document.body.classList.remove("service-active");
            var tabButtons = document.querySelectorAll("#tabs ul li button");
            if (tabButtons[0]) tabButtons[0].click();
          });

          log("Initialization complete");
        } catch (err) {
          console.error("SWEETPEA CUSTOM JS ERROR:", err);
        }
      }

      if (document.readyState === "complete") {
        waitForHomepage(init);
      } else {
        window.addEventListener("load", function() { waitForHomepage(init); });
      }
    })();

  services.yaml: |
