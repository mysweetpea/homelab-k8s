---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-templates
  namespace: monitoring
data:
  settings.yaml: |
    title: SweetPea Homelab
    description: A self-hosted sanctuary
    headerStyle: boxedWidgets
    theme: dark
    color: slate
    iconStyle: theme
    target: _blank
    fullWidth: true
    disableCollapse: true
    useEqualHeights: true
    statusStyle: dot
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo
    layout:
      Info Widgets:
        tab: 🏠 Public
        header: false
        style: row
        columns: 4
      Public Services:
        tab: 🏠 Public
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Media:
        tab: 🎬 Media
        icon: sh-mediathekview
        style: row
        columns: 2
      Arr Stack:
        tab: 🎬 Media
        icon: sh-quickstack
        style: row
        columns: 4
      Private:
        tab: 🔒 Private
        icon: mdi-shield-lock-outline
        style: row
        columns: 4
      Infrastructure:
        tab: ⚙️ System
        icon: sh-linux-containers-lxc
        style: row
        columns: 4
      Monitoring:
        tab: ⚙️ System
        icon: sh-mozilla-monitor
        style: row
        columns: 3
      Coming Soon:
        tab: 🚀 Coming Soon
        icon: mdi-rocket-launch
        style: row
        columns: 4

  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/mysweetpea
        - ArgoCD:
            - abbr: AR
              href: http://192.168.20.220
        - Traefik:
            - abbr: TR
              href: http://192.168.20.210:8080
        - Uptime Kuma:
            - abbr: UK
              href: http://192.168.20.217:3001
    - Resources:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
        - Helm Docs:
            - abbr: HL
              href: https://helm.sh/docs/

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  widgets.yaml: |
    - resources:
        backend: resources
        cpu: true
        memory: true
        expanded: true
        disk: /
    - search:
        provider: duckduckgo
        target: _blank
        focus: false

  custom.css: |
    /* ═══════════════════════════════════════════════════════════════
       SweetPea Homelab — Branch Navigation Theme
       ═══════════════════════════════════════════════════════════════ */

    :root {
      --glass-card: rgba(30, 41, 59, 0.55);
      --glass-card-hover: rgba(30, 41, 59, 0.72);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-border-hover: rgba(16, 185, 129, 0.3);
      --accent: #10b981;
      --accent-light: #34d399;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --radius-lg: 18px;
      --radius-md: 12px;
      --blur: 20px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.22);
      --shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(16, 185, 129, 0.12), 0 0 60px rgba(16, 185, 129, 0.08);
    }

    /* ── Body Background ── */
    body {
      background:
        radial-gradient(ellipse at 15% 0%, rgba(16, 185, 129, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(99, 102, 241, 0.03) 0%, transparent 55%),
        linear-gradient(135deg, #0a0f1c 0%, #0f172a 35%, #151d2e 65%, #0b1220 100%) !important;
      background-attachment: fixed !important;
    }

    /* ── Hide Default Header & Tabs ── */
    .header,
    #tabs {
      display: none !important;
    }

    /* ── Stats Bar — Fixed at Top ── */
    #information-widgets {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 100 !important;
      background: rgba(10, 15, 28, 0.88) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
      padding: 10px 24px !important;
      margin: 0 !important;
      border-radius: 0 !important;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3) !important;
    }

    #information-widgets .widget-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 4px 12px !important;
      margin: 0 !important;
    }

    .information-widget-resource div[style*="width"] {
      background: linear-gradient(90deg, #10b981 0%, #34d399 40%, #22d3ee 100%) !important;
      opacity: 0.6 !important;
      border-radius: 10px !important;
    }

    .information-widget-resource:nth-of-type(1) svg { color: #10b981 !important; }
    .information-widget-resource:nth-of-type(2) svg { color: #22d3ee !important; }
    .information-widget-resource:nth-of-type(3) svg { color: #a78bfa !important; }

    /* ── Container Padding (space for fixed stats bar) ── */
    .container {
      padding-top: 80px !important;
    }

    body.service-view .container {
      padding-top: 130px !important;
    }

    /* ── Branch Overlay ── */
    #branch-overlay {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
      overflow: hidden;
    }

    #branch-overlay.exit {
      transform: translateY(-100vh);
      opacity: 0;
      pointer-events: none;
    }

    #branch-content {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: 500px;
    }

    /* ── Branch SVG Lines ── */
    #branch-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .branch-line {
      fill: none;
      stroke: #1e293b;
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke 0.3s ease, stroke-width 0.3s ease, filter 0.3s ease;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: draw-line 1.2s ease forwards;
    }

    .branch-line:nth-child(1) { animation-delay: 0.1s; }
    .branch-line:nth-child(2) { animation-delay: 0.25s; }
    .branch-line:nth-child(3) { animation-delay: 0.4s; }
    .branch-line:nth-child(4) { animation-delay: 0.55s; }
    .branch-line:nth-child(5) { animation-delay: 0.7s; }

    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }

    .branch-line.active {
      stroke: #10b981;
      stroke-width: 3;
      filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.5));
    }

    /* ── Center Logo ── */
    #branch-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    #branch-logo img {
      height: 130px;
      width: auto;
      object-fit: contain;
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% {
        filter: drop-shadow(0 0 24px rgba(16, 185, 129, 0.5))
                drop-shadow(0 0 48px rgba(16, 185, 129, 0.2));
      }
      50% {
        filter: drop-shadow(0 0 36px rgba(16, 185, 129, 0.75))
                drop-shadow(0 0 72px rgba(16, 185, 129, 0.32));
      }
    }

    /* ── Branch Buttons ── */
    .branch-btn {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 14px 28px;
      color: #94a3b8;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 4;
      white-space: nowrap;
      opacity: 0;
      animation: fade-in-btn 0.5s ease forwards;
      animation-delay: 1s;
    }

    .branch-btn:nth-child(3) { animation-delay: 1.1s; }
    .branch-btn:nth-child(4) { animation-delay: 1.2s; }
    .branch-btn:nth-child(5) { animation-delay: 1.3s; }
    .branch-btn:nth-child(6) { animation-delay: 1.4s; }
    .branch-btn:nth-child(7) { animation-delay: 1.5s; }

    @keyframes fade-in-btn {
      to { opacity: 1; }
    }

    .branch-btn:hover {
      background: rgba(16, 185, 129, 0.12);
      border-color: rgba(16, 185, 129, 0.35);
      color: #fff;
      box-shadow: 0 0 28px rgba(16, 185, 129, 0.2), 0 8px 24px rgba(0, 0, 0, 0.3);
      transform: translate(-50%, -50%) scale(1.05);
    }

    /* ── Back Button ── */
    #back-btn {
      position: fixed;
      top: 82px;
      left: 24px;
      z-index: 90;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      padding: 10px 20px;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      opacity: 0;
      transform: translateY(-10px);
    }

    #back-btn.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.3s ease 0.3s, transform 0.3s ease 0.3s;
    }

    #back-btn:hover {
      background: rgba(16, 185, 129, 0.12);
      border-color: rgba(16, 185, 129, 0.35);
      color: #fff;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
    }

    /* ── Service Cards — Glassmorphism ── */
    .service-card {
      position: relative !important;
      background: var(--glass-card) !important;
      backdrop-filter: blur(var(--blur)) !important;
      -webkit-backdrop-filter: blur(var(--blur)) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: var(--radius-lg) !important;
      overflow: hidden !important;
      isolation: isolate !important;
      transition: all var(--transition) !important;
      box-shadow: var(--shadow-card) !important;
    }

    .service-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 50%, rgba(255,255,255,0) 100%);
      z-index: 0;
      pointer-events: none;
    }

    .service-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 12%;
      right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      z-index: 2;
      pointer-events: none;
    }

    .service-card:hover {
      transform: translateY(-5px) !important;
      background: var(--glass-card-hover) !important;
      border-color: var(--glass-border-hover) !important;
      box-shadow: var(--shadow-hover) !important;
    }

    .service-card > div {
      position: relative !important;
      z-index: 1 !important;
    }

    /* ── Service Card Color Tints ── */
    #jellyfin-card::before  { background: radial-gradient(circle at top left, rgba(170,92,195,0.18), transparent 70%) !important; }
    #seerr-card::before     { background: radial-gradient(circle at top left, rgba(245,158,11,0.18), transparent 70%) !important; }
    #radarr-card::before    { background: radial-gradient(circle at top left, rgba(251,191,36,0.18), transparent 70%) !important; }
    #sonarr-card::before    { background: radial-gradient(circle at top left, rgba(37,193,255,0.18), transparent 70%) !important; }
    #bazarr-card::before    { background: radial-gradient(circle at top left, rgba(147,51,234,0.18), transparent 70%) !important; }
    #prowlarr-card::before  { background: radial-gradient(circle at top left, rgba(239,68,68,0.18), transparent 70%) !important; }
    #qbittorrent-card::before { background: radial-gradient(circle at top left, rgba(57,186,93,0.18), transparent 70%) !important; }
    #nextcloud-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 70%) !important; }
    #immich-card::before    { background: radial-gradient(circle at top left, rgba(234,34,34,0.18), transparent 70%) !important; }
    #n8n-card::before       { background: radial-gradient(circle at top left, rgba(236,72,72,0.18), transparent 70%) !important; }
    #gotify-card::before    { background: radial-gradient(circle at top left, rgba(74,222,128,0.18), transparent 70%) !important; }
    #affine-card::before    { background: radial-gradient(circle at top left, rgba(168,85,247,0.18), transparent 70%) !important; }
    #authentik-card::before { background: radial-gradient(circle at top left, rgba(249,115,22,0.18), transparent 70%) !important; }
    #vaultwarden-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 70%) !important; }
    #matrix-card::before    { background: radial-gradient(circle at top left, rgba(16,185,129,0.18), transparent 70%) !important; }
    #element-card::before   { background: radial-gradient(circle at top left, rgba(14,165,233,0.18), transparent 70%) !important; }
    #open-webui-card::before { background: radial-gradient(circle at top left, rgba(99,102,241,0.18), transparent 70%) !important; }
    #ollama-card::before    { background: radial-gradient(circle at top left, rgba(236,72,153,0.18), transparent 70%) !important; }
    #searxng-card::before   { background: radial-gradient(circle at top left, rgba(100,116,139,0.18), transparent 70%) !important; }
    #uptime-kuma-card::before { background: radial-gradient(circle at top left, rgba(97,239,173,0.18), transparent 70%) !important; }
    #netdata-card::before   { background: radial-gradient(circle at top left, rgba(34,211,238,0.18), transparent 70%) !important; }
    #argocd-card::before    { background: radial-gradient(circle at top left, rgba(249,115,22,0.18), transparent 70%) !important; }
    #rustdesk-card::before  { background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 70%) !important; }
    #qdrant-card::before    { background: radial-gradient(circle at top left, rgba(220,38,38,0.18), transparent 70%) !important; }
    #koalasync-card::before { background: radial-gradient(circle at top left, rgba(139,115,85,0.18), transparent 70%) !important; }
    #jellyfin2-card::before { background: radial-gradient(circle at top left, rgba(170,92,195,0.12), transparent 70%) !important; }
    #seerr2-card::before    { background: radial-gradient(circle at top left, rgba(245,158,11,0.12), transparent 70%) !important; }
    #n8n2-card::before      { background: radial-gradient(circle at top left, rgba(236,72,72,0.12), transparent 70%) !important; }
    #affine2-card::before   { background: radial-gradient(circle at top left, rgba(168,85,247,0.12), transparent 70%) !important; }
    #authentik2-card::before { background: radial-gradient(circle at top left, rgba(249,115,22,0.12), transparent 70%) !important; }
    #vaultwarden2-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.12), transparent 70%) !important; }
    #matrix2-card::before   { background: radial-gradient(circle at top left, rgba(16,185,129,0.12), transparent 70%) !important; }
    #element2-card::before  { background: radial-gradient(circle at top left, rgba(14,165,233,0.12), transparent 70%) !important; }
    #flaresolverr-card::before { background: radial-gradient(circle at top left, rgba(251,146,60,0.18), transparent 70%) !important; }
    #questarr-card::before  { background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 70%) !important; }
    #nzbdav-card::before    { background: radial-gradient(circle at top left, rgba(245,158,11,0.18), transparent 70%) !important; }
    #postgresql-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 70%) !important; }

    /* ── Coming Soon Cards ── */
    #grafana-card, #prometheus-card, #syncthing-card,
    #stalwart-card, #remux-card {
      opacity: 0.55 !important;
      border-style: dashed !important;
      border-color: rgba(255,255,255,0.06) !important;
    }

    #grafana-card:hover, #prometheus-card:hover, #syncthing-card:hover,
    #stalwart-card:hover, #remux-card:hover {
      opacity: 0.8 !important;
      border-style: solid !important;
      border-color: var(--glass-border-hover) !important;
    }

    /* ── Service Text ── */
    .service-name {
      color: var(--text-primary) !important;
      font-weight: 600 !important;
      font-size: 0.9rem !important;
    }

    .service-description {
      color: var(--text-muted) !important;
      font-size: 0.75rem !important;
    }

    /* ── Status Badges ── */
    .service-tags {
      position: absolute !important;
      top: 10px !important;
      right: 12px !important;
      z-index: 10 !important;
    }

    .service-ping .ping-status {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 8px !important;
      padding: 2px 8px !important;
    }

    .service-ping .ping-status div {
      font-size: 9px !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
    }

    /* ── Group Headers ── */
    .service-group-name, .bookmark-group-name {
      color: var(--text-secondary) !important;
      font-weight: 700 !important;
      font-size: 0.78rem !important;
      letter-spacing: 0.07em !important;
      text-transform: uppercase !important;
      opacity: 0.7 !important;
      margin-bottom: 0.6rem !important;
    }

    /* ── Bookmarks ── */
    li.bookmark a {
      border-radius: var(--radius-md) !important;
      background: rgba(255,255,255,0.03) !important;
      border: 1px solid var(--glass-border) !important;
      box-shadow: none !important;
      overflow: hidden !important;
      margin-bottom: 8px !important;
      transition: all var(--transition) !important;
    }

    li.bookmark a:hover {
      background: rgba(255,255,255,0.07) !important;
      transform: translateY(-2px) !important;
      border-color: var(--glass-border-hover) !important;
    }

    li.bookmark .bookmark-icon {
      border-radius: 0 !important;
      background: rgba(255,255,255,0.02) !important;
      border-right: 1px solid var(--glass-border) !important;
    }

    .bookmark-name {
      color: var(--text-secondary) !important;
      font-weight: 600 !important;
      font-size: 0.8rem !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #branch-content {
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 40px 20px;
      }
      #branch-svg { display: none; }
      .branch-btn {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        transform: none !important;
        width: 80%;
        text-align: center;
      }
      .branch-btn:hover {
        transform: scale(1.02) !important;
      }
      #branch-logo img { height: 80px !important; }
      #back-btn { top: 78px; left: 12px; }
    }

  custom.js: |
    (function() {
      let initialized = false;

      function init() {
        if (initialized) return;
        initialized = true;

        // 1. Hide default header and tabs
        var header = document.querySelector('.header, [class*="header"]');
        if (header) header.style.display = 'none';

        var tabs = document.getElementById('tabs');
        if (tabs) tabs.style.display = 'none';

        // 2. Create particle canvas
        var canvas = document.createElement('canvas');
        canvas.id = 'particle-canvas';
        canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';
        document.body.prepend(canvas);
        var ctx = canvas.getContext('2d');
        var particles = [];
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        for (var i = 0; i < 20; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.4 + 0.3,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            o: Math.random() * 0.25 + 0.05
          });
        }
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(function(p) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(16,185,129,' + p.o + ')';
            ctx.fill();
          });
          requestAnimationFrame(animate);
        }
        animate();

        // 3. Create branch overlay
        var overlay = document.createElement('div');
        overlay.id = 'branch-overlay';
        overlay.innerHTML = '\
          <div id="branch-content">\
            <svg id="branch-svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet">\
              <path class="branch-line" d="M 600 250 Q 400 200, 200 150" />\
              <path class="branch-line" d="M 600 250 Q 400 300, 200 350" />\
              <path class="branch-line" d="M 600 250 Q 800 180, 1000 100" />\
              <path class="branch-line" d="M 600 250 Q 800 250, 1000 250" />\
              <path class="branch-line" d="M 600 250 Q 800 320, 1000 400" />\
            </svg>\
            <div id="branch-logo">\
              <img src="https://raw.githubusercontent.com/mysweetpea/portfolio/main/workers/site/logo.svg" alt="SweetPea" />\
            </div>\
            <button class="branch-btn" data-tab-index="0" style="left: 16.67%; top: 30%;">\
              <span>Public</span>\
            </button>\
            <button class="branch-btn" data-tab-index="4" style="left: 16.67%; top: 70%;">\
              <span>Coming Soon</span>\
            </button>\
            <button class="branch-btn" data-tab-index="1" style="left: 83.33%; top: 20%;">\
              <span>Media</span>\
            </button>\
            <button class="branch-btn" data-tab-index="2" style="left: 83.33%; top: 50%;">\
              <span>Private</span>\
            </button>\
            <button class="branch-btn" data-tab-index="3" style="left: 83.33%; top: 80%;">\
              <span>System</span>\
            </button>\
          </div>\
        ';
        document.body.appendChild(overlay);

        // 4. Create back button
        var backBtn = document.createElement('button');
        backBtn.id = 'back-btn';
        backBtn.innerHTML = '\u2190 Back to Home';
        document.body.appendChild(backBtn);

        // 5. Branch line elements for hover effects
        var branchLines = overlay.querySelectorAll('.branch-line');
        var branchBtns = overlay.querySelectorAll('.branch-btn');

        // 6. Branch button hover — highlight corresponding line
        branchBtns.forEach(function(btn, idx) {
          btn.addEventListener('mouseenter', function() {
            if (branchLines[idx]) branchLines[idx].classList.add('active');
          });
          btn.addEventListener('mouseleave', function() {
            if (branchLines[idx]) branchLines[idx].classList.remove('active');
          });
        });

        // 7. Branch button click — navigate to services
        branchBtns.forEach(function(btn) {
          btn.addEventListener('click', function() {
            var tabIndex = parseInt(this.dataset.tabIndex);

            // Trigger the corresponding tab click
            var tabButtons = document.querySelectorAll('#tabs ul li button');
            if (tabButtons[tabIndex]) {
              tabButtons[tabIndex].click();
            }

            // Animate overlay out (push up)
            overlay.classList.add('exit');
            document.body.classList.add('service-view');
            document.body.classList.remove('branch-view');

            // Show back button after animation
            setTimeout(function() {
              backBtn.classList.add('visible');
            }, 400);
          });
        });

        // 8. Back button click — return to branch view
        backBtn.addEventListener('click', function() {
          backBtn.classList.remove('visible');
          overlay.classList.remove('exit');
          document.body.classList.add('branch-view');
          document.body.classList.remove('service-view');

          // Reset tab to first (optional)
          var tabButtons = document.querySelectorAll('#tabs ul li button');
          if (tabButtons[0]) {
            tabButtons[0].click();
          }
        });

        // 9. Set initial state
        document.body.classList.add('branch-view');
      }

      // Wait for page load + hydration
      if (document.readyState === 'complete') {
        setTimeout(init, 800);
      } else {
        window.addEventListener('load', function() {
          setTimeout(init, 800);
        });
      }
    })();

