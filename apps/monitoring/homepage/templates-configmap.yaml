---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-templates
  namespace: monitoring
data:
  settings.yaml: |
    title: SweetPea Homelab
    description: A self-hosted sanctuary
    headerStyle: boxedWidgets
    theme: dark
    color: slate
    iconStyle: theme
    target: _blank
    fullWidth: true
    disableCollapse: true
    useEqualHeights: true
    statusStyle: dot
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo
    layout:
      Info Widgets:
        tab: 🏠 Public
        header: false
        style: row
        columns: 4
      Public Services:
        tab: 🏠 Public
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Media:
        tab: 🎬 Media
        icon: sh-mediathekview
        style: row
        columns: 2
      Arr Stack:
        tab: 🎬 Media
        icon: sh-quickstack
        style: row
        columns: 4
      Private:
        tab: 🔒 Private
        icon: mdi-shield-lock-outline
        style: row
        columns: 4
      Infrastructure:
        tab: ⚙️ System
        icon: sh-linux-containers-lxc
        style: row
        columns: 4
      Monitoring:
        tab: ⚙️ System
        icon: sh-mozilla-monitor
        style: row
        columns: 3
      Coming Soon:
        tab: 🚀 Coming Soon
        icon: mdi-rocket-launch
        style: row
        columns: 4

  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/mysweetpea
        - ArgoCD:
            - abbr: AR
              href: http://192.168.20.220
        - Traefik:
            - abbr: TR
              href: http://192.168.20.210:8080
        - Uptime Kuma:
            - abbr: UK
              href: http://192.168.20.217:3001
    - Resources:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
        - Helm Docs:
            - abbr: HL
              href: https://helm.sh/docs/

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  widgets.yaml: |
    - resources:
        backend: resources
        cpu: true
        memory: true
        expanded: true
        disk: /
    - search:
        provider: duckduckgo
        target: _blank
        focus: false

  custom.css: |
    /* ═══════════════════════════════════════════════════════════════
       SweetPea Homelab — Black & Gold Branch Navigation v3
       ═══════════════════════════════════════════════════════════════ */

    :root {
      --gold: #d4af37;
      --gold-light: #f0c75e;
      --gold-dark: #b8941f;
      --gold-glow: rgba(212, 175, 55, 0.3);
      --black-bg: #0a0a0a;
      --black-card: rgba(18, 18, 18, 0.7);
      --black-card-hover: rgba(22, 22, 22, 0.85);
      --border: rgba(212, 175, 55, 0.1);
      --border-hover: rgba(212, 175, 55, 0.35);
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-muted: #555;
      --radius-lg: 16px;
      --radius-md: 10px;
      --blur: 16px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.5);
      --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.12), 0 0 50px rgba(212, 175, 55, 0.08);
    }

    /* ── Body — Deep Black ── */
    body {
      background:
        radial-gradient(ellipse at 50% 40%, rgba(212, 175, 55, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 30% 70%, rgba(212, 175, 55, 0.02) 0%, transparent 45%),
        #0a0a0a !important;
      background-attachment: fixed !important;
      color: var(--text-primary) !important;
    }

    /* ── Hide Default Header & Tabs ── */
    .header,
    #tabs {
      display: none !important;
    }

    /* ── Stats Bar — Fixed at Top ── */
    #information-widgets {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 200 !important;
      background: rgba(6, 6, 6, 0.95) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 8px 24px !important;
      margin: 0 !important;
      border-radius: 0 !important;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6) !important;
    }

    #information-widgets .widget-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 2px 10px !important;
      margin: 0 !important;
    }

    .information-widget-resource div[style*="width"] {
      background: linear-gradient(90deg, #d4af37 0%, #f0c75e 50%, #d4af37 100%) !important;
      opacity: 0.5 !important;
      border-radius: 10px !important;
    }

    .information-widget-resource:nth-of-type(1) svg { color: #d4af37 !important; }
    .information-widget-resource:nth-of-type(2) svg { color: #f0c75e !important; }
    .information-widget-resource:nth-of-type(3) svg { color: #b8941f !important; }

    /* ── Container ── */
    .container {
      padding-top: 60px !important;
    }

    /* ── HIDE ALL service content, bookmarks, footer in branch view ── */
    body.branch-view .service-group,
    body.branch-view .bookmark-group,
    body.branch-view #footer,
    body.branch-view [class*="service-group"],
    body.branch-view [class*="bookmark"] {
      display: none !important;
    }

    /* ── Service View — Blurred Background ── */
    body.service-view #branch-overlay {
      filter: blur(12px) brightness(0.3);
      transform: scale(1.05);
      pointer-events: none;
      transition: filter 0.5s ease, transform 0.5s ease;
    }

    body.service-view #branch-overlay.exit {
      transform: translateY(0) scale(1.05);
    }

    /* ── Service Content Wrapper ── */
    #service-content-wrapper {
      position: fixed;
      top: 55px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 150;
      overflow-y: auto;
      background: rgba(8, 8, 8, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
      padding: 20px 24px 60px 24px;
    }

    body.service-view #service-content-wrapper {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* ── Branch Overlay ── */
    #branch-overlay {
      position: fixed;
      top: 55px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.5s ease, transform 0.5s ease, opacity 0.4s ease;
    }

    #branch-content {
      position: relative;
      width: 100%;
      max-width: 1600px;
      height: 700px;
    }

    /* ── Branch SVG Lines — Gold Vines ── */
    #branch-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .branch-line {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 1.5;
      stroke-linecap: round;
      transition: stroke 0.3s ease, stroke-width 0.3s ease, filter 0.3s ease, opacity 0.3s ease;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw-line 1.8s ease forwards;
      opacity: 0.4;
    }

    .branch-line:nth-child(1) { animation-delay: 0.3s; }
    .branch-line:nth-child(2) { animation-delay: 0.5s; }
    .branch-line:nth-child(3) { animation-delay: 0.7s; }
    .branch-line:nth-child(4) { animation-delay: 0.9s; }
    .branch-line:nth-child(5) { animation-delay: 1.1s; }

    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }

    .branch-line.active {
      stroke: var(--gold);
      stroke-width: 3;
      opacity: 1;
      filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.6));
    }

    /* ── Vine Leaves ── */
    .vine-leaf {
      fill: var(--gold-dark);
      opacity: 0;
      animation: leaf-appear 0.8s ease forwards;
    }

    .vine-leaf:nth-child(6) { animation-delay: 1.8s; }
    .vine-leaf:nth-child(7) { animation-delay: 2s; }
    .vine-leaf:nth-child(8) { animation-delay: 2.2s; }
    .vine-leaf:nth-child(9) { animation-delay: 2.4s; }
    .vine-leaf:nth-child(10) { animation-delay: 2.6s; }
    .vine-leaf:nth-child(11) { animation-delay: 2.8s; }
    .vine-leaf:nth-child(12) { animation-delay: 3s; }
    .vine-leaf:nth-child(13) { animation-delay: 3.2s; }
    .vine-leaf:nth-child(14) { animation-delay: 3.4s; }
    .vine-leaf:nth-child(15) { animation-delay: 3.6s; }

    @keyframes leaf-appear {
      to { opacity: 0.2; }
    }

    /* ── Center Logo — Very Large & Illuminated ── */
    #branch-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    #branch-logo img {
      height: 320px;
      width: auto;
      object-fit: contain;
      animation: pulse-gold 6s ease-in-out infinite;
    }

    @keyframes pulse-gold {
      0%, 100% {
        filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.35))
                drop-shadow(0 0 70px rgba(212, 175, 55, 0.12));
      }
      50% {
        filter: drop-shadow(0 0 55px rgba(212, 175, 55, 0.6))
                drop-shadow(0 0 110px rgba(212, 175, 55, 0.25));
      }
    }

    /* ── Branch Buttons with Gold Vine Border ── */
    .branch-btn-wrapper {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 4;
      opacity: 0;
      animation: fade-in-btn 0.6s ease forwards;
      animation-delay: 1.4s;
    }

    .branch-btn-wrapper:nth-of-type(2) { animation-delay: 1.5s; }
    .branch-btn-wrapper:nth-of-type(3) { animation-delay: 1.6s; }
    .branch-btn-wrapper:nth-of-type(4) { animation-delay: 1.7s; }
    .branch-btn-wrapper:nth-of-type(5) { animation-delay: 1.8s; }

    @keyframes fade-in-btn {
      to { opacity: 1; }
    }

    .branch-btn-vine {
      position: absolute;
      top: -8px;
      left: -8px;
      right: -8px;
      bottom: -8px;
      pointer-events: none;
      overflow: visible;
    }

    .branch-btn-vine path {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 1;
      opacity: 0.3;
      transition: stroke 0.3s ease, stroke-width 0.3s ease, opacity 0.3s ease;
    }

    .branch-btn-vine .vine-flower {
      fill: var(--gold-dark);
      opacity: 0.15;
      transition: opacity 0.3s ease, fill 0.3s ease;
    }

    .branch-btn-wrapper:hover .branch-btn-vine path {
      stroke: var(--gold);
      stroke-width: 1.5;
      opacity: 0.7;
      filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.4));
    }

    .branch-btn-wrapper:hover .branch-btn-vine .vine-flower {
      fill: var(--gold);
      opacity: 0.4;
    }

    .branch-btn {
      background: rgba(12, 12, 12, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 36px;
      color: var(--text-secondary);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      display: block;
      position: relative;
      z-index: 2;
    }

    .branch-btn-wrapper:hover .branch-btn {
      background: rgba(212, 175, 55, 0.06);
      border-color: var(--border-hover);
      color: var(--gold-light);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.12), 0 8px 24px rgba(0, 0, 0, 0.5);
      transform: scale(1.05);
    }

    /* ── Back Button ── */
    #back-btn {
      position: fixed;
      top: 68px;
      left: 24px;
      z-index: 250;
      background: rgba(12, 12, 12, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 22px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      opacity: 0;
      transform: translateY(-10px);
    }

    #back-btn.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.3s ease 0.3s, transform 0.3s ease 0.3s;
    }

    #back-btn:hover {
      background: rgba(212, 175, 55, 0.08);
      border-color: var(--border-hover);
      color: var(--gold-light);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.12);
    }

    /* ── Service Cards — Black & Gold ── */
    .service-card {
      position: relative !important;
      background: var(--black-card) !important;
      backdrop-filter: blur(var(--blur)) !important;
      -webkit-backdrop-filter: blur(var(--blur)) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-lg) !important;
      overflow: hidden !important;
      isolation: isolate !important;
      transition: all var(--transition) !important;
      box-shadow: var(--shadow-card) !important;
    }

    .service-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212,175,55,0.03) 0%, rgba(255,255,255,0.01) 50%, transparent 100%);
      z-index: 0;
      pointer-events: none;
    }

    .service-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 12%;
      right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
      z-index: 2;
      pointer-events: none;
    }

    .service-card:hover {
      transform: translateY(-5px) !important;
      background: var(--black-card-hover) !important;
      border-color: var(--border-hover) !important;
      box-shadow: var(--shadow-hover) !important;
    }

    .service-card > div {
      position: relative !important;
      z-index: 1 !important;
    }

    /* ── Service Card Gold Tints ── */
    #jellyfin-card::before  { background: radial-gradient(circle at top left, rgba(170,92,195,0.10), transparent 70%) !important; }
    #seerr-card::before     { background: radial-gradient(circle at top left, rgba(245,158,11,0.10), transparent 70%) !important; }
    #radarr-card::before    { background: radial-gradient(circle at top left, rgba(251,191,36,0.10), transparent 70%) !important; }
    #sonarr-card::before    { background: radial-gradient(circle at top left, rgba(37,193,255,0.10), transparent 70%) !important; }
    #bazarr-card::before    { background: radial-gradient(circle at top left, rgba(147,51,234,0.10), transparent 70%) !important; }
    #prowlarr-card::before  { background: radial-gradient(circle at top left, rgba(239,68,68,0.10), transparent 70%) !important; }
    #qbittorrent-card::before { background: radial-gradient(circle at top left, rgba(57,186,93,0.10), transparent 70%) !important; }
    #nextcloud-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 70%) !important; }
    #immich-card::before    { background: radial-gradient(circle at top left, rgba(234,34,34,0.10), transparent 70%) !important; }
    #n8n-card::before       { background: radial-gradient(circle at top left, rgba(236,72,72,0.10), transparent 70%) !important; }
    #gotify-card::before    { background: radial-gradient(circle at top left, rgba(74,222,128,0.10), transparent 70%) !important; }
    #affine-card::before    { background: radial-gradient(circle at top left, rgba(168,85,247,0.10), transparent 70%) !important; }
    #authentik-card::before { background: radial-gradient(circle at top left, rgba(249,115,22,0.10), transparent 70%) !important; }
    #vaultwarden-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 70%) !important; }
    #matrix-card::before    { background: radial-gradient(circle at top left, rgba(16,185,129,0.10), transparent 70%) !important; }
    #element-card::before   { background: radial-gradient(circle at top left, rgba(14,165,233,0.10), transparent 70%) !important; }
    #open-webui-card::before { background: radial-gradient(circle at top left, rgba(99,102,241,0.10), transparent 70%) !important; }
    #ollama-card::before    { background: radial-gradient(circle at top left, rgba(236,72,153,0.10), transparent 70%) !important; }
    #searxng-card::before   { background: radial-gradient(circle at top left, rgba(100,116,139,0.10), transparent 70%) !important; }
    #uptime-kuma-card::before { background: radial-gradient(circle at top left, rgba(97,239,173,0.10), transparent 70%) !important; }
    #netdata-card::before   { background: radial-gradient(circle at top left, rgba(34,211,238,0.10), transparent 70%) !important; }
    #argocd-card::before    { background: radial-gradient(circle at top left, rgba(249,115,22,0.10), transparent 70%) !important; }
    #rustdesk-card::before  { background: radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 70%) !important; }
    #qdrant-card::before    { background: radial-gradient(circle at top left, rgba(220,38,38,0.10), transparent 70%) !important; }
    #koalasync-card::before { background: radial-gradient(circle at top left, rgba(139,115,85,0.10), transparent 70%) !important; }
    #jellyfin2-card::before { background: radial-gradient(circle at top left, rgba(170,92,195,0.07), transparent 70%) !important; }
    #seerr2-card::before    { background: radial-gradient(circle at top left, rgba(245,158,11,0.07), transparent 70%) !important; }
    #n8n2-card::before      { background: radial-gradient(circle at top left, rgba(236,72,72,0.07), transparent 70%) !important; }
    #affine2-card::before   { background: radial-gradient(circle at top left, rgba(168,85,247,0.07), transparent 70%) !important; }
    #authentik2-card::before { background: radial-gradient(circle at top left, rgba(249,115,22,0.07), transparent 70%) !important; }
    #vaultwarden2-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.07), transparent 70%) !important; }
    #matrix2-card::before   { background: radial-gradient(circle at top left, rgba(16,185,129,0.07), transparent 70%) !important; }
    #element2-card::before  { background: radial-gradient(circle at top left, rgba(14,165,233,0.07), transparent 70%) !important; }
    #flaresolverr-card::before { background: radial-gradient(circle at top left, rgba(251,146,60,0.10), transparent 70%) !important; }
    #questarr-card::before  { background: radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 70%) !important; }
    #nzbdav-card::before    { background: radial-gradient(circle at top left, rgba(245,158,11,0.10), transparent 70%) !important; }
    #postgresql-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 70%) !important; }

    /* ── Coming Soon Cards ── */
    #grafana-card, #prometheus-card, #syncthing-card,
    #stalwart-card, #remux-card {
      opacity: 0.45 !important;
      border-style: dashed !important;
      border-color: rgba(212,175,55,0.05) !important;
    }

    #grafana-card:hover, #prometheus-card:hover, #syncthing-card:hover,
    #stalwart-card:hover, #remux-card:hover {
      opacity: 0.7 !important;
      border-style: solid !important;
      border-color: var(--border-hover) !important;
    }

    /* ── Service Text ── */
    .service-name {
      color: var(--text-primary) !important;
      font-weight: 600 !important;
      font-size: 0.9rem !important;
    }

    .service-description {
      color: var(--text-muted) !important;
      font-size: 0.75rem !important;
    }

    /* ── Status Badges ── */
    .service-tags {
      position: absolute !important;
      top: 10px !important;
      right: 12px !important;
      z-index: 10 !important;
    }

    .service-ping .ping-status {
      background: rgba(212,175,55,0.05) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 2px 8px !important;
    }

    .service-ping .ping-status div {
      font-size: 9px !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
    }

    /* ── Group Headers ── */
    .service-group-name, .bookmark-group-name {
      color: var(--gold-dark) !important;
      font-weight: 700 !important;
      font-size: 0.78rem !important;
      letter-spacing: 0.07em !important;
      text-transform: uppercase !important;
      opacity: 0.8 !important;
      margin-bottom: 0.6rem !important;
    }

    /* ── Bookmarks ── */
    li.bookmark a {
      border-radius: var(--radius-md) !important;
      background: rgba(212,175,55,0.02) !important;
      border: 1px solid var(--border) !important;
      box-shadow: none !important;
      overflow: hidden !important;
      margin-bottom: 8px !important;
      transition: all var(--transition) !important;
    }

    li.bookmark a:hover {
      background: rgba(212,175,55,0.06) !important;
      transform: translateY(-2px) !important;
      border-color: var(--border-hover) !important;
    }

    li.bookmark .bookmark-icon {
      border-radius: 0 !important;
      background: rgba(212,175,55,0.01) !important;
      border-right: 1px solid var(--border) !important;
    }

    .bookmark-name {
      color: var(--text-secondary) !important;
      font-weight: 600 !important;
      font-size: 0.8rem !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212,175,55,0.2); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #branch-content {
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 40px 20px;
      }
      #branch-svg { display: none; }
      .branch-btn-wrapper {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        transform: none !important;
        width: 80%;
      }
      .branch-btn-wrapper:hover .branch-btn {
        transform: scale(1.02) !important;
      }
      #branch-logo img { height: 160px !important; }
      #back-btn { top: 64px; left: 12px; }
    }

  custom.js: |
    (function() {
      var initialized = false;

      function init() {
        if (initialized) return;
        initialized = true;

        // 1. Hide default header and tabs
        var header = document.querySelector('.header, [class*="header"]');
        if (header) header.style.display = 'none';
        var tabs = document.getElementById('tabs');
        if (tabs) tabs.style.display = 'none';

        // 2. Create particle canvas (gold dust)
        var canvas = document.createElement('canvas');
        canvas.id = 'particle-canvas';
        canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';
        document.body.prepend(canvas);
        var ctx = canvas.getContext('2d');
        var particles = [];
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        for (var i = 0; i < 25; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.2,
            vx: (Math.random() - 0.5) * 0.1,
            vy: (Math.random() - 0.5) * 0.1,
            o: Math.random() * 0.18 + 0.03
          });
        }
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(function(p) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(212,175,55,' + p.o + ')';
            ctx.fill();
          });
          requestAnimationFrame(animate);
        }
        animate();

        // 3. Create service content wrapper (for blurred overlay effect)
        var serviceWrapper = document.createElement('div');
        serviceWrapper.id = 'service-content-wrapper';
        document.body.appendChild(serviceWrapper);

        // 4. Move all service groups and bookmarks into the wrapper
        function moveContentToWrapper() {
          var container = document.querySelector('.container');
          if (!container) return;
          var children = Array.prototype.slice.call(container.children);
          children.forEach(function(child) {
            if (child.id === 'information-widgets' || child.id === 'branch-overlay' || child.id === 'back-btn') return;
            if (child.classList && (child.classList.contains('header') || child.id === 'tabs')) return;
            // Move service groups, bookmarks, footer into wrapper
            if (child.id !== 'information-widgets' && child.id !== 'footer') {
              serviceWrapper.appendChild(child);
            } else if (child.id === 'footer') {
              serviceWrapper.appendChild(child);
            }
          });
        }

        // 5. Create branch overlay with vine borders on buttons
        var overlay = document.createElement('div');
        overlay.id = 'branch-overlay';

        // Vine border SVG for buttons (wraps around the button)
        function vineBorderSVG() {
          return '<svg class="branch-btn-vine" viewBox="0 0 200 60" preserveAspectRatio="none">' +
            '<path d="M 5 30 Q 10 10, 25 12 Q 45 8, 60 15 Q 80 5, 100 10 Q 120 5, 140 15 Q 160 8, 175 12 Q 190 15, 195 30 Q 190 45, 175 48 Q 160 52, 140 45 Q 120 55, 100 50 Q 80 55, 60 45 Q 45 52, 25 48 Q 10 50, 5 30 Z" />' +
            '<circle class="vine-flower" cx="15" cy="15" r="3" />' +
            '<circle class="vine-flower" cx="100" cy="8" r="2.5" />' +
            '<circle class="vine-flower" cx="185" cy="15" r="3" />' +
            '<circle class="vine-flower" cx="15" cy="45" r="2.5" />' +
            '<circle class="vine-flower" cx="100" cy="52" r="3" />' +
            '<circle class="vine-flower" cx="185" cy="45" r="2.5" />' +
            '</svg>';
        }

        overlay.innerHTML =
          '<div id="branch-content">' +
            '<svg id="branch-svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid meet">' +
              '<path class="branch-line" d="M 800 350 C 550 320, 350 250, 160 180" />' +
              '<path class="branch-line" d="M 800 350 C 550 380, 350 450, 160 520" />' +
              '<path class="branch-line" d="M 800 350 C 1050 300, 1250 200, 1440 130" />' +
              '<path class="branch-line" d="M 800 350 C 1050 350, 1250 350, 1440 350" />' +
              '<path class="branch-line" d="M 800 350 C 1050 400, 1250 500, 1440 570" />' +
              // Vine leaves
              '<ellipse class="vine-leaf" cx="480" cy="305" rx="7" ry="3.5" transform="rotate(-25 480 305)" />' +
              '<ellipse class="vine-leaf" cx="350" cy="265" rx="6" ry="3" transform="rotate(-30 350 265)" />' +
              '<ellipse class="vine-leaf" cx="580" cy="365" rx="7" ry="3.5" transform="rotate(20 580 365)" />' +
              '<ellipse class="vine-leaf" cx="380" cy="425" rx="6" ry="3" transform="rotate(25 380 425)" />' +
              '<ellipse class="vine-leaf" cx="1020" cy="315" rx="7" ry="3.5" transform="rotate(20 1020 315)" />' +
              '<ellipse class="vine-leaf" cx="1200" cy="245" rx="6" ry="3" transform="rotate(30 1200 245)" />' +
              '<ellipse class="vine-leaf" cx="1080" cy="355" rx="6" ry="3" transform="rotate(-10 1080 355)" />' +
              '<ellipse class="vine-leaf" cx="1250" cy="355" rx="6" ry="3" transform="rotate(-5 1250 355)" />' +
              '<ellipse class="vine-leaf" cx="1050" cy="395" rx="7" ry="3.5" transform="rotate(-20 1050 395)" />' +
              '<ellipse class="vine-leaf" cx="1230" cy="465" rx="6" ry="3" transform="rotate(-25 1230 465)" />' +
            '</svg>' +
            '<div id="branch-logo">' +
              '<img src="https://raw.githubusercontent.com/mysweetpea/portfolio/main/workers/site/logo.svg" alt="SweetPea" />' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 10%; top: 25.7%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="0">Public</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 10%; top: 74.3%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="4">Coming Soon</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 90%; top: 18.6%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="1">Media</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 90%; top: 50%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="2">Private</button>' +
            '</div>' +
            '<div class="branch-btn-wrapper" style="left: 90%; top: 81.4%;">' +
              vineBorderSVG() +
              '<button class="branch-btn" data-tab-index="3">System</button>' +
            '</div>' +
          '</div>';
        document.body.appendChild(overlay);

        // 6. Create back button
        var backBtn = document.createElement('button');
        backBtn.id = 'back-btn';
        backBtn.innerHTML = '\u2190 Back to Home';
        document.body.appendChild(backBtn);

        // 7. Move content to wrapper after a delay (let Homepage render)
        setTimeout(moveContentToWrapper, 200);
        setTimeout(moveContentToWrapper, 1000);
        setTimeout(moveContentToWrapper, 2000);

        // 8. Branch line elements for hover effects
        var branchLines = overlay.querySelectorAll('.branch-line');
        var branchBtnWrappers = overlay.querySelectorAll('.branch-btn-wrapper');

        // 9. Branch button hover — highlight corresponding line
        branchBtnWrappers.forEach(function(wrapper, idx) {
          wrapper.addEventListener('mouseenter', function() {
            if (branchLines[idx]) branchLines[idx].classList.add('active');
          });
          wrapper.addEventListener('mouseleave', function() {
            if (branchLines[idx]) branchLines[idx].classList.remove('active');
          });
        });

        // 10. Branch button click — show services with blurred background
        branchBtnWrappers.forEach(function(wrapper) {
          var btn = wrapper.querySelector('.branch-btn');
          if (!btn) return;
          btn.addEventListener('click', function() {
            var tabIndex = parseInt(this.dataset.tabIndex);

            // Trigger the corresponding tab click
            var tabButtons = document.querySelectorAll('#tabs ul li button');
            if (tabButtons[tabIndex]) {
              tabButtons[tabIndex].click();
            }

            // Switch to service view (blur the branch overlay, show services)
            document.body.classList.remove('branch-view');
            document.body.classList.add('service-view');

            // Show back button
            setTimeout(function() {
              backBtn.classList.add('visible');
            }, 300);
          });
        });

        // 11. Back button click — return to branch view
        backBtn.addEventListener('click', function() {
          backBtn.classList.remove('visible');
          document.body.classList.remove('service-view');
          document.body.classList.add('branch-view');

          // Reset tab to first
          var tabButtons = document.querySelectorAll('#tabs ul li button');
          if (tabButtons[0]) {
            tabButtons[0].click();
          }
        });

        // 12. Set initial state
        document.body.classList.add('branch-view');
      }

      // Wait for page load + hydration
      if (document.readyState === 'complete') {
        setTimeout(init, 1200);
      } else {
        window.addEventListener('load', function() {
          setTimeout(init, 1200);
        });
      }
    })();

