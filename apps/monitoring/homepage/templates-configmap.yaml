---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-templates
  namespace: monitoring
data:
  settings.yaml: |
    title: SweetPea Homelab
    description: A self-hosted sanctuary
    headerStyle: boxedWidgets
    theme: dark
    color: slate
    iconStyle: theme
    target: _blank
    fullWidth: true
    disableCollapse: true
    useEqualHeights: true
    statusStyle: dot
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo
    layout:
      Info Widgets:
        tab: 🏠 Public
        header: false
        style: row
        columns: 4
      Public Services:
        tab: 🏠 Public
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Media:
        tab: 🎬 Media
        icon: sh-mediathekview
        style: row
        columns: 2
      Arr Stack:
        tab: 🎬 Media
        icon: sh-quickstack
        style: row
        columns: 4
      Private:
        tab: 🔒 Private
        icon: mdi-shield-lock-outline
        style: row
        columns: 4
      Infrastructure:
        tab: ⚙️ System
        icon: sh-linux-containers-lxc
        style: row
        columns: 4
      Monitoring:
        tab: ⚙️ System
        icon: sh-mozilla-monitor
        style: row
        columns: 3
      Coming Soon:
        tab: 🚀 Coming Soon
        icon: mdi-rocket-launch
        style: row
        columns: 4

  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/mysweetpea
        - ArgoCD:
            - abbr: AR
              href: http://192.168.20.220
        - Traefik:
            - abbr: TR
              href: http://192.168.20.210:8080
    - Resources:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
        - Helm Docs:
            - abbr: HL
              href: https://helm.sh/docs/

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: |
    - nginx-dmz:
        host: 192.168.10.10
        port: 2375

  widgets.yaml: |
    - logo:
        icon: https://raw.githubusercontent.com/mysweetpea/portfolio/main/workers/site/logo.svg
    - greeting:
        text_size: 2xl
        text: "Welcome back, sweetpea"
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: full
          hour12: false
    - search:
        provider: duckduckgo
        target: _blank
        focus: false
    - resources:
        backend: resources
        cpu: true
        memory: true
        expanded: true
        disk: /

  custom.css: |
    /* ═══════════════════════════════════════════════════════════════
       SweetPea Homelab — Nordic Glassmorphism v2 — Refined & Polished
       ═══════════════════════════════════════════════════════════════ */

    /* ── CSS Variables ── */
    :root {
      --glass-bg: rgba(15, 23, 42, 0.75);
      --glass-card: rgba(30, 41, 59, 0.55);
      --glass-card-hover: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-border-hover: rgba(16, 185, 129, 0.3);
      --accent: #10b981;
      --accent-light: #34d399;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --blur: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.2);
      --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(16, 185, 129, 0.12), 0 0 80px rgba(16, 185, 129, 0.06);
    }

    /* ── Body Background — Multi-layer gradient ── */
    body {
      background:
        radial-gradient(ellipse at 20% 0%, rgba(16, 185, 129, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
        linear-gradient(135deg, #0b1120 0%, #0f172a 30%, #1a1f35 60%, #0d1525 100%) !important;
      background-attachment: fixed !important;
    }

    /* Subtle grid overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header / Logo Area ── */
    .header {
      position: relative;
      padding: 2rem 0 0.75rem 0 !important;
    }

    /* Logo container — centered and prominent */
    /* Logo widget — upscaled */
    .information-widget-logo,
    .information-widget-logo img,
    .header .logo img,
    [class*="information-widget-logo"] img {
      height: 120px !important;
      width: auto !important;
      max-width: 200px !important;
      object-fit: contain !important;
      filter: drop-shadow(0 0 24px rgba(16, 185, 129, 0.5))
              drop-shadow(0 0 48px rgba(16, 185, 129, 0.2)) !important;
      transition: filter var(--transition), transform var(--transition) !important;
    }

    .information-widget-logo img:hover,
    .header .logo img:hover,
    [class*="information-widget-logo"] img:hover {
      filter: drop-shadow(0 0 36px rgba(16, 185, 129, 0.7))
              drop-shadow(0 0 72px rgba(16, 185, 129, 0.35)) !important;
      transform: scale(1.05) !important;
    }

    /* Title styling — gradient text */
    .header h1 {
      font-size: 1.7rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.03em !important;
      background: linear-gradient(135deg, #e2e8f0 0%, #10b981 50%, #34d399 100%) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      background-clip: text !important;
      text-align: center !important;
      margin-bottom: 0.25rem !important;
    }

    /* Description subtitle */
    .header p {
      text-align: center !important;
      color: var(--text-muted) !important;
      font-size: 0.8rem !important;
      letter-spacing: 0.05em !important;
    }

    /* ── Tab Navigation — Pill style with glow ── */
    #tabs ul {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 4px !important;
      padding: 6px !important;
      margin: 0 auto 2rem auto !important;
      width: fit-content !important;
      background: rgba(30, 41, 59, 0.5) !important;
      backdrop-filter: blur(var(--blur)) !important;
      -webkit-backdrop-filter: blur(var(--blur)) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: 50px !important;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15) !important;
    }

    #tabs ul li {
      flex: 0 0 auto !important;
      width: auto !important;
    }

    #tabs ul li button {
      width: auto !important;
      border-radius: 50px !important;
      padding: 9px 24px !important;
      min-height: unset !important;
      font-size: 0.875rem !important;
      font-weight: 500 !important;
      color: var(--text-secondary) !important;
      background: transparent !important;
      transition: all var(--transition) !important;
      border: none !important;
    }

    #tabs ul li button:hover {
      color: var(--text-primary) !important;
      background: rgba(255, 255, 255, 0.06) !important;
    }

    #tabs ul li button[aria-selected="true"] {
      color: #fff !important;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.25), rgba(52, 211, 153, 0.15)) !important;
      font-weight: 600 !important;
      box-shadow: 0 0 24px rgba(16, 185, 129, 0.2), inset 0 0 0 1px rgba(16, 185, 129, 0.15) !important;
    }

    /* ── Service Cards — Enhanced Glassmorphism ── */
    .service-card {
      position: relative !important;
      background: var(--glass-card) !important;
      backdrop-filter: blur(var(--blur)) !important;
      -webkit-backdrop-filter: blur(var(--blur)) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: var(--radius-lg) !important;
      overflow: hidden !important;
      isolation: isolate !important;
      transition: all var(--transition) !important;
      box-shadow: var(--shadow-card) !important;
    }

    .service-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.01) 50%,
        rgba(255,255,255,0) 100%);
      z-index: 0;
      pointer-events: none;
      transition: opacity var(--transition) !important;
    }

    /* Subtle top highlight line */
    .service-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      z-index: 2;
      pointer-events: none;
    }

    .service-card:hover {
      transform: translateY(-5px) !important;
      background: var(--glass-card-hover) !important;
      border-color: var(--glass-border-hover) !important;
      box-shadow: var(--shadow-hover) !important;
    }

    .service-card:hover::before {
      opacity: 1.5 !important;
    }

    .service-card > div {
      position: relative !important;
      z-index: 1 !important;
    }

    /* ── Service Card Color Tinting ── */
    #jellyfin-card::before  { background: radial-gradient(circle at top left, rgba(170,92,195,0.22), transparent 70%) !important; }
    #seerr-card::before     { background: radial-gradient(circle at top left, rgba(245,158,11,0.22), transparent 70%) !important; }
    #radarr-card::before    { background: radial-gradient(circle at top left, rgba(251,191,36,0.22), transparent 70%) !important; }
    #sonarr-card::before    { background: radial-gradient(circle at top left, rgba(37,193,255,0.22), transparent 70%) !important; }
    #bazarr-card::before    { background: radial-gradient(circle at top left, rgba(147,51,234,0.22), transparent 70%) !important; }
    #prowlarr-card::before  { background: radial-gradient(circle at top left, rgba(239,68,68,0.22), transparent 70%) !important; }
    #qbittorrent-card::before { background: radial-gradient(circle at top left, rgba(57,186,93,0.22), transparent 70%) !important; }
    #nextcloud-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 70%) !important; }
    #immich-card::before    { background: radial-gradient(circle at top left, rgba(234,34,34,0.22), transparent 70%) !important; }
    #n8n-card::before       { background: radial-gradient(circle at top left, rgba(236,72,72,0.22), transparent 70%) !important; }
    #gotify-card::before    { background: radial-gradient(circle at top left, rgba(74,222,128,0.22), transparent 70%) !important; }
    #affine-card::before    { background: radial-gradient(circle at top left, rgba(168,85,247,0.22), transparent 70%) !important; }
    #traefik-card::before   { background: radial-gradient(circle at top left, rgba(37,193,255,0.22), transparent 70%) !important; }
    #authentik-card::before { background: radial-gradient(circle at top left, rgba(249,115,22,0.22), transparent 70%) !important; }
    #vaultwarden-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 70%) !important; }
    #matrix-card::before    { background: radial-gradient(circle at top left, rgba(16,185,129,0.22), transparent 70%) !important; }
    #element-card::before   { background: radial-gradient(circle at top left, rgba(14,165,233,0.22), transparent 70%) !important; }
    #open-webui-card::before { background: radial-gradient(circle at top left, rgba(99,102,241,0.22), transparent 70%) !important; }
    #ollama-card::before    { background: radial-gradient(circle at top left, rgba(236,72,153,0.22), transparent 70%) !important; }
    #searxng-card::before   { background: radial-gradient(circle at top left, rgba(100,116,139,0.22), transparent 70%) !important; }
    #uptime-kuma-card::before { background: radial-gradient(circle at top left, rgba(97,239,173,0.22), transparent 70%) !important; }
    #netdata-card::before   { background: radial-gradient(circle at top left, rgba(34,211,238,0.22), transparent 70%) !important; }
    #argocd-card::before    { background: radial-gradient(circle at top left, rgba(249,115,22,0.22), transparent 70%) !important; }
    #rustdesk-card::before  { background: radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 70%) !important; }
    #qdrant-card::before    { background: radial-gradient(circle at top left, rgba(220,38,38,0.22), transparent 70%) !important; }
    #flaresolverr-card::before { background: radial-gradient(circle at top left, rgba(251,146,60,0.22), transparent 70%) !important; }
    #questarr-card::before  { background: radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 70%) !important; }
    #nzbdav-card::before    { background: radial-gradient(circle at top left, rgba(245,158,11,0.22), transparent 70%) !important; }
    #postgresql-card::before { background: radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 70%) !important; }
    #koalasync-card::before { background: radial-gradient(circle at top left, rgba(139,115,85,0.22), transparent 70%) !important; }

    /* ── Coming Soon Cards — Special Styling ── */
    #grafana-card, #prometheus-card, #syncthing-card,
    #stalwart-card, #remux-card, #koalasync-card {
      opacity: 0.65 !important;
      border-style: dashed !important;
      border-color: rgba(255,255,255,0.08) !important;
    }

    #grafana-card:hover, #prometheus-card:hover, #syncthing-card:hover,
    #stalwart-card:hover, #remux-card:hover, #koalasync-card:hover {
      opacity: 0.85 !important;
      border-style: solid !important;
      border-color: var(--glass-border-hover) !important;
    }

    /* ── Service Name & Description ── */
    .service-name {
      color: var(--text-primary) !important;
      font-weight: 600 !important;
      font-size: 0.9rem !important;
      letter-spacing: 0.01em !important;
    }

    .service-description {
      color: var(--text-muted) !important;
      font-size: 0.75rem !important;
    }

    /* ── Status & Ping Badges ── */
    .service-tags {
      position: absolute !important;
      top: 10px !important;
      right: 12px !important;
      z-index: 10 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: flex-end !important;
      gap: 4px !important;
    }

    .service-ping .ping-status {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 8px !important;
      padding: 2px 8px !important;
      height: auto !important;
      width: auto !important;
      background-image: none !important;
    }

    .service-ping .ping-status div {
      font-size: 9px !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      opacity: 1 !important;
      line-height: 1.2 !important;
    }

    /* ── Group Headers ── */
    .service-group-name, .bookmark-group-name {
      color: var(--text-secondary) !important;
      font-weight: 700 !important;
      font-size: 0.8rem !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase !important;
      opacity: 0.65 !important;
      margin-bottom: 0.5rem !important;
    }

    /* ── Info Widgets — Glass cards ── */
    .widget-container,
    .information-widget-logo,
    [class*="information-widget-glances"] {
      background: var(--glass-card) !important;
      backdrop-filter: blur(var(--blur)) !important;
      -webkit-backdrop-filter: blur(var(--blur)) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: var(--radius-lg) !important;
      padding: 18px 22px !important;
      margin-bottom: 12px !important;
      box-shadow: var(--shadow-card) !important;
      transition: all var(--transition) !important;
    }

    .widget-container:hover,
    [class*="information-widget-glances"]:hover {
      border-color: rgba(255,255,255,0.1) !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25) !important;
    }

    /* ── Resource Bars ── */
    .information-widget-resource div[style*="width"] {
      background: linear-gradient(90deg, #10b981 0%, #34d399 40%, #22d3ee 75%, #a78bfa 100%) !important;
      opacity: 0.6 !important;
      border-radius: 10px !important;
    }

    .information-widget-resource:nth-of-type(1) svg { color: #10b981 !important; }
    .information-widget-resource:nth-of-type(2) svg { color: #22d3ee !important; }
    .information-widget-resource:nth-of-type(3) svg { color: #ef4444 !important; }
    .information-widget-resource:nth-of-type(4) svg { color: #a78bfa !important; }

    /* ── Bookmarks ── */
    li.bookmark a {
      border-radius: var(--radius-md) !important;
      background: rgba(255,255,255,0.03) !important;
      border: 1px solid var(--glass-border) !important;
      box-shadow: none !important;
      overflow: hidden !important;
      margin-bottom: 8px !important;
      transition: all var(--transition) !important;
    }

    li.bookmark a:hover {
      background: rgba(255,255,255,0.08) !important;
      transform: translateY(-2px) !important;
      border-color: var(--glass-border-hover) !important;
    }

    li.bookmark .bookmark-icon {
      border-radius: 0 !important;
      background: rgba(255,255,255,0.02) !important;
      border-right: 1px solid var(--glass-border) !important;
    }

    .bookmark-name {
      color: var(--text-secondary) !important;
      font-weight: 600 !important;
      font-size: 0.8rem !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header .logo img { height: 52px !important; }
      .header h1 { font-size: 1.2rem !important; }
      #tabs ul li button { padding: 7px 16px !important; font-size: 0.8rem !important; }
      .service-card { border-radius: var(--radius-md) !important; }
    }

  custom.js: |
    /* ── Add subtle particle animation to background ── */
    (function() {
      const canvas = document.createElement('canvas');
      canvas.id = 'particle-canvas';
      canvas.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;';
      document.body.prepend(canvas);
      const ctx = canvas.getContext('2d');
      let particles = [];
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);
      for (let i = 0; i < 35; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          o: Math.random() * 0.35 + 0.08
        });
      }
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = canvas.width;
          if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height;
          if (p.y > canvas.height) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(16,185,129,${p.o})`;
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();

