---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-templates
  namespace: monitoring
data:
  settings.yaml: |
    title: SweetPea Homelab
    description: A self-hosted sanctuary
    headerStyle: boxedWidgets
    theme: dark
    color: slate
    iconStyle: theme
    target: _blank
    fullWidth: true
    disableCollapse: true
    useEqualHeights: true
    statusStyle: dot
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo
    layout:
      Info Widgets:
        tab: 🏠 Public
        header: false
        style: row
        columns: 4
      Public Services:
        tab: 🏠 Public
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Media:
        tab: 🎬 Media
        icon: sh-mediathekview
        style: row
        columns: 2
      Arr Stack:
        tab: 🎬 Media
        icon: sh-quickstack
        style: row
        columns: 4
      Private:
        tab: 🔒 Private
        icon: mdi-shield-lock-outline
        style: row
        columns: 4
      Infrastructure:
        tab: ⚙️ System
        icon: sh-linux-containers-lxc
        style: row
        columns: 4
      Monitoring:
        tab: ⚙️ System
        icon: sh-mozilla-monitor
        style: row
        columns: 3
      Coming Soon:
        tab: 🚀 Coming Soon
        icon: mdi-rocket-launch
        style: row
        columns: 4

  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/mysweetpea
        - ArgoCD:
            - abbr: AR
              href: http://192.168.20.220
        - Traefik:
            - abbr: TR
              href: http://192.168.20.210:8080
        - Uptime Kuma:
            - abbr: UK
              href: http://192.168.20.217:3001
    - Resources:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
        - Helm Docs:
            - abbr: HL
              href: https://helm.sh/docs/

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  widgets.yaml: |
    - resources:
        backend: resources
        cpu: true
        memory: true
        expanded: true
        disk: /
    - search:
        provider: duckduckgo
        target: _blank
        focus: false

  custom.css: |
    :root {
      --gold: #d4af37;
      --gold-light: #f0c75e;
      --gold-dark: #b8941f;
      --gold-dim: rgba(212, 175, 55, 0.12);
      --border: rgba(212, 175, 55, 0.15);
      --border-hover: rgba(212, 175, 55, 0.45);
      --bg: #050505;
      --card-bg: rgba(15, 15, 15, 0.72);
      --font-stack: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html, body {
      background-color: var(--bg) !important;
      background-image: none !important;
      color: #f0f0f0 !important;
      font-family: var(--font-stack) !important;
    }

    #__next, #page_wrapper, #inner_wrapper, .container {
      background-color: transparent !important;
      background-image: none !important;
    }

    /* Subtle animated film grain */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      animation: grain 0.5s steps(10) infinite;
    }

    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-2%, -2%); }
      20% { transform: translate(2%, 2%); }
      30% { transform: translate(-1%, 1%); }
      40% { transform: translate(1%, -1%); }
      50% { transform: translate(-2%, 2%); }
      60% { transform: translate(2%, -2%); }
      70% { transform: translate(-1%, -1%); }
      80% { transform: translate(1%, 1%); }
      90% { transform: translate(-2%, -1%); }
    }

    /* Hide default header & tabs */
    .header { display: none !important; }
    #tabs {
      position: fixed !important;
      top: -100px !important;
      left: -100px !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
      overflow: hidden !important;
      z-index: -1 !important;
    }

    /* Top stats / info bar */
    #information-widgets {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 10001 !important;
      background: rgba(5, 5, 5, 0.82) !important;
      backdrop-filter: blur(24px) saturate(180%) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 10px 28px !important;
      margin: 0 !important;
      border-radius: 0 !important;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    body.service-active #information-widgets {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translateY(-100%);
    }

    #information-widgets .widget-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 4px 12px !important;
      margin: 0 !important;
    }

    .information-widget-resource div[style*="width"] {
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark)) !important;
      opacity: 0.55 !important;
      border-radius: 10px !important;
      box-shadow: 0 0 8px rgba(212, 175, 55, 0.2) !important;
    }

    .information-widget-resource:nth-of-type(1) svg { color: var(--gold) !important; }
    .information-widget-resource:nth-of-type(2) svg { color: var(--gold-light) !important; }
    .information-widget-resource:nth-of-type(3) svg { color: var(--gold-dark) !important; }

    /* Main container spacing */
    .container {
      padding-top: 72px !important;
      position: relative;
      z-index: 1;
    }

    /* Service view: centered vertically */
    body.service-active .container {
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      max-width: 1500px !important;
      margin: 0 auto !important;
      min-height: 100vh !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      padding-left: 32px !important;
      padding-right: 32px !important;
    }

    body.service-active .bookmark-group,
    body.service-active [class*="bookmark-group"],
    body.service-active #footer,
    body.service-active [id*="footer"] {
      display: none !important;
    }

    /* Service cards — premium glassmorphism */
    .service-card {
      background: var(--card-bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 18px !important;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1) !important;
      backdrop-filter: blur(10px) !important;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 18px;
      padding: 1px;
      background: linear-gradient(135deg, transparent 40%, rgba(212, 175, 55, 0.25) 50%, transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    .service-card:hover {
      transform: translateY(-6px) scale(1.01) !important;
      border-color: var(--border-hover) !important;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(212, 175, 55, 0.15),
        0 0 60px rgba(212, 175, 55, 0.1) !important;
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-group-name,
    .bookmark-group-name {
      color: var(--gold-dark) !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
      font-size: 0.85rem !important;
      margin-bottom: 12px !important;
    }

    li.bookmark a {
      background: rgba(212, 175, 55, 0.03) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      transition: all 0.25s ease !important;
    }

    li.bookmark a:hover {
      background: rgba(212, 175, 55, 0.08) !important;
      border-color: var(--border-hover) !important;
      transform: translateY(-2px);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.35); }

    /* Branch overlay */
    #branch-overlay {
      position: fixed !important;
      inset: 0 !important;
      z-index: 9999 !important;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(212, 175, 55, 0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 45%),
        var(--bg) !important;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
      overflow: hidden;
    }

    #branch-overlay.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    #branch-content {
      position: relative;
      width: 100%;
      max-width: 2000px;
      height: 100vh;
      z-index: 2;
    }

    #branch-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      filter: drop-shadow(0 0 4px rgba(212, 175, 55, 0.15));
    }

    .branch-line {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 0.5;
      stroke-linecap: round;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw-line 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0.5;
      transition: all 0.3s ease;
    }

    .branch-line.active {
      stroke: var(--gold);
      stroke-width: 0.9;
      opacity: 1;
      filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.6));
    }

    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }

    .branch-tendril {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 0.25;
      stroke-linecap: round;
      opacity: 0;
      animation: leaf-appear 1.2s ease forwards;
    }

    .vine-leaf {
      fill: var(--gold-dark);
      opacity: 0;
      animation: leaf-appear 1s ease forwards;
      transform-origin: center;
      transition: all 0.3s ease;
    }

    .vine-leaf:hover {
      fill: var(--gold);
      opacity: 0.6 !important;
    }

    @keyframes leaf-appear {
      to { opacity: 0.35; }
    }

    #branch-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      animation: logo-entrance 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes logo-entrance {
      0% { opacity: 0; transform: translate(-50%, -45%) scale(0.92); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    #branch-logo img {
      height: 520px;
      width: auto;
      object-fit: contain;
      animation: pulse-gold 7s ease-in-out infinite;
    }

    @keyframes pulse-gold {
      0%, 100% { filter: drop-shadow(0 0 50px rgba(212, 175, 55, 0.45)) drop-shadow(0 0 110px rgba(212, 175, 55, 0.18)); }
      50% { filter: drop-shadow(0 0 80px rgba(212, 175, 55, 0.7)) drop-shadow(0 0 160px rgba(212, 175, 55, 0.28)); }
    }

    .branch-btn-wrapper {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 4;
      opacity: 0;
      animation: fade-in-btn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fade-in-btn {
      0% { opacity: 0; transform: translate(-50%, -45%); }
      100% { opacity: 1; transform: translate(-50%, -50%); }
    }

    .branch-btn-vine {
      position: absolute;
      top: -18px;
      left: -18px;
      right: -18px;
      bottom: -18px;
      pointer-events: none;
      overflow: visible;
    }

    .branch-btn-vine path {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 1.2;
      opacity: 0.45;
      transition: all 0.3s ease;
    }

    .branch-btn-vine .vine-flower {
      fill: var(--gold-dark);
      opacity: 0.25;
      transition: all 0.3s ease;
    }

    .branch-btn-vine .vine-flower-small {
      fill: var(--gold-light);
      opacity: 0.15;
      transition: all 0.3s ease;
    }

    .branch-btn-wrapper:hover .branch-btn-vine path {
      stroke: var(--gold);
      stroke-width: 2;
      opacity: 0.85;
      filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    }

    .branch-btn-wrapper:hover .branch-btn-vine .vine-flower {
      fill: var(--gold);
      opacity: 0.55;
    }

    .branch-btn-wrapper:hover .branch-btn-vine .vine-flower-small {
      fill: var(--gold-light);
      opacity: 0.4;
    }

    .branch-btn {
      background: rgba(8, 8, 8, 0.88);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 44px;
      color: #a8a8a8;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      display: block;
      position: relative;
      z-index: 2;
    }

    .branch-btn-wrapper:hover .branch-btn {
      background: rgba(212, 175, 55, 0.1);
      border-color: var(--border-hover);
      color: var(--gold-light);
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.18);
      transform: scale(1.05);
    }

    #back-btn {
      position: fixed;
      top: 22px;
      left: 26px;
      z-index: 10000;
      background: rgba(8, 8, 8, 0.88);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 24px;
      color: #a8a8a8;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      opacity: 0;
      transform: translateY(-10px);
    }

    #back-btn.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.3s ease 0.3s, transform 0.3s ease 0.3s;
    }

    #back-btn:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--border-hover);
      color: var(--gold-light);
    }

    /* Mobile */
    @media (max-width: 768px) {
      #branch-content {
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 50px 24px;
      }

      #branch-svg { display: none; }

      .branch-btn-wrapper {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        transform: none !important;
        width: 85%;
        animation: fade-in-btn-mobile 0.6s ease forwards;
      }

      @keyframes fade-in-btn-mobile {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .branch-btn-wrapper:hover .branch-btn {
        transform: scale(1.02) !important;
      }

      #branch-logo {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
        margin-bottom: 20px;
        animation: none;
      }

      #branch-logo img {
        height: 220px !important;
      }

      #back-btn {
        top: 14px;
        left: 14px;
        padding: 8px 16px;
      }

      .container {
        padding-top: 60px !important;
      }
    }

  custom.js: |
    (function() {
      'use strict';

      var initialized = false;

      function init() {
        if (initialized) return;
        if (!document.querySelector('.container')) {
          setTimeout(init, 300);
          return;
        }
        initialized = true;

        var header = document.querySelector('.header');
        if (header) header.style.display = 'none';

        // Single shared petal canvas
        var canvas = document.createElement('canvas');
        canvas.id = 'petal-canvas';
        canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';
        document.body.prepend(canvas);
        var ctx = canvas.getContext('2d');

        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        var petals = [];
        var petalCount = Math.min(60, Math.floor((canvas.width * canvas.height) / 40000));
        for (var i = 0; i < petalCount; i++) {
          petals.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 5 + 2.5,
            speedY: Math.random() * 0.9 + 0.25,
            speedX: (Math.random() - 0.5) * 0.6,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.025,
            opacity: Math.random() * 0.35 + 0.15,
            sway: Math.random() * 0.015 + 0.005,
            swayOffset: Math.random() * Math.PI * 2
          });
        }

        var frame = 0;
        function animatePetals() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          frame++;
          for (var i = 0; i < petals.length; i++) {
            var p = petals[i];
            p.y += p.speedY;
            p.x += p.speedX + Math.sin(frame * p.sway + p.swayOffset) * 0.35;
            p.rotation += p.rotationSpeed;

            if (p.y > canvas.height + 20) {
              p.y = -20;
              p.x = Math.random() * canvas.width;
            }
            if (p.x < -20) p.x = canvas.width + 20;
            if (p.x > canvas.width + 20) p.x = -20;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = '#d4af37';
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.55, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
          requestAnimationFrame(animatePetals);
        }
        animatePetals();

        // Build branch overlay
        var overlay = document.createElement('div');
        overlay.id = 'branch-overlay';

        function vineBorderSVG() {
          return '<svg class="branch-btn-vine" viewBox="0 0 160 80" preserveAspectRatio="none">' +
            '<path d="M10,40 Q30,10 50,40 T90,40 T130,40 T150,40" />' +
            '<path d="M10,40 Q30,70 50,40 T90,40 T130,40 T150,40" />' +
            '<circle class="vine-flower" cx="25" cy="28" r="3" />' +
            '<circle class="vine-flower-small" cx="35" cy="58" r="2" />' +
            '<circle class="vine-flower" cx="75" cy="35" r="2.5" />' +
            '<circle class="vine-flower-small" cx="115" cy="48" r="2" />' +
            '<circle class="vine-flower" cx="140" cy="32" r="3" />' +
            '</svg>';
        }

        function makeLeaf(cx, cy, rot) {
          return '<path class="vine-leaf" d="M0,0 C4,-6 10,-6 12,0 C10,6 4,6 0,0" transform="translate(' + cx + ',' + cy + ') rotate(' + rot + ') scale(0.8)" />';
        }

        overlay.innerHTML =
          '<div id="branch-content">' +
            '<svg id="branch-svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">' +
              '<path class="branch-line" style="animation-delay:0.2s" d="M960,540 C1050,540 1100,420 1200,320" />' +
              '<path class="branch-line" style="animation-delay:0.4s" d="M960,540 C1080,540 1150,620 1280,760" />' +
              '<path class="branch-line" style="animation-delay:0.6s" d="M960,540 C880,540 820,540 720,540" />' +
              '<path class="branch-line" style="animation-delay:0.8s" d="M960,540 C860,540 780,420 680,320" />' +
              '<path class="branch-line" style="animation-delay:1.0s" d="M960,540 C860,540 780,660 680,760" />' +
              '<path class="branch-tendril" style="animation-delay:2.2s" d="M1100,420 Q1100,380 1060,360" />' +
              '<path class="branch-tendril" style="animation-delay:2.4s" d="M1150,620 Q1180,650 1220,640" />' +
              '<path class="branch-tendril" style="animation-delay:2.6s" d="M820,540 Q780,580 740,560" />' +
              '<path class="branch-tendril" style="animation-delay:2.8s" d="M780,420 Q740,400 720,430" />' +
              '<path class="branch-tendril" style="animation-delay:3.0s" d="M780,660 Q740,700 720,680" />' +
              makeLeaf(1120, 380, 45) +
              makeLeaf(1180, 360, -20) +
              makeLeaf(1220, 720, 30) +
              makeLeaf(1160, 780, -45) +
              makeLeaf(760, 540, 90) +
              makeLeaf(720, 520, -60) +
              makeLeaf(700, 360, 20) +
              makeLeaf(680, 340, -30) +
              makeLeaf(700, 720, -20) +
              makeLeaf(680, 760, 40) +
            '</svg>' +
            '<div id="branch-logo"><img src="/logo.svg" alt="SweetPea" /></div>' +
            '<div class="branch-btn-wrapper" style="top:30%;left:75%;animation-delay:1.4s">' + vineBorderSVG() + '<button class="branch-btn" data-tab-index="0">Public</button></div>' +
            '<div class="branch-btn-wrapper" style="top:70%;left:72%;animation-delay:1.55s">' + vineBorderSVG() + '<button class="branch-btn" data-tab-index="1">Coming Soon</button></div>' +
            '<div class="branch-btn-wrapper" style="top:50%;left:25%;animation-delay:1.7s">' + vineBorderSVG() + '<button class="branch-btn" data-tab-index="2">Media</button></div>' +
            '<div class="branch-btn-wrapper" style="top:30%;left:28%;animation-delay:1.85s">' + vineBorderSVG() + '<button class="branch-btn" data-tab-index="3">Private</button></div>' +
            '<div class="branch-btn-wrapper" style="top:70%;left:32%;animation-delay:2.0s">' + vineBorderSVG() + '<button class="branch-btn" data-tab-index="4">System</button></div>' +
          '</div>';
        document.body.appendChild(overlay);

        // Back button
        var backBtn = document.createElement('button');
        backBtn.id = 'back-btn';
        backBtn.innerHTML = '← Back to Home';
        document.body.appendChild(backBtn);

        // Hover line activation
        var branchLines = overlay.querySelectorAll('.branch-line');
        var branchBtnWrappers = overlay.querySelectorAll('.branch-btn-wrapper');
        branchBtnWrappers.forEach(function(wrapper, idx) {
          wrapper.addEventListener('mouseenter', function() {
            if (branchLines[idx]) branchLines[idx].classList.add('active');
          });
          wrapper.addEventListener('mouseleave', function() {
            if (branchLines[idx]) branchLines[idx].classList.remove('active');
          });
        });

        // Branch button click
        branchBtnWrappers.forEach(function(wrapper) {
          var btn = wrapper.querySelector('.branch-btn');
          if (!btn) return;
          btn.addEventListener('click', function() {
            var tabIndex = parseInt(this.dataset.tabIndex);
            var tabButtons = document.querySelectorAll('#tabs ul li button');
            if (tabButtons[tabIndex]) tabButtons[tabIndex].click();
            overlay.classList.add('hidden');
            document.body.classList.add('service-active');
            setTimeout(function() { backBtn.classList.add('visible'); }, 350);
            window.scrollTo(0, 0);
          });
        });

        // Back button click
        backBtn.addEventListener('click', function() {
          backBtn.classList.remove('visible');
          overlay.classList.remove('hidden');
          document.body.classList.remove('service-active');
          var tabButtons = document.querySelectorAll('#tabs ul li button');
          if (tabButtons[0]) tabButtons[0].click();
        });
      }

      if (document.readyState === 'complete') {
        init();
      } else {
        window.addEventListener('load', init);
      }
    })();

