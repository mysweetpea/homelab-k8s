---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-templates
  namespace: monitoring
data:
  settings.yaml: |
    title: SweetPea Homelab
    description: A self-hosted sanctuary
    headerStyle: boxedWidgets
    theme: dark
    color: slate
    iconStyle: theme
    target: _blank
    fullWidth: true
    disableCollapse: true
    useEqualHeights: true
    statusStyle: dot
    hideVersion: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: duckduckgo
    layout:
      Info Widgets:
        tab: 🏠 Public
        header: false
        style: row
        columns: 4
      Public Services:
        tab: 🏠 Public
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Media:
        tab: 🎬 Media
        icon: sh-mediathekview
        style: row
        columns: 2
      Arr Stack:
        tab: 🎬 Media
        icon: sh-quickstack
        style: row
        columns: 4
      Private:
        tab: 🔒 Private
        icon: mdi-shield-lock-outline
        style: row
        columns: 4
      Infrastructure:
        tab: ⚙️ System
        icon: sh-linux-containers-lxc
        style: row
        columns: 4
      Monitoring:
        tab: ⚙️ System
        icon: sh-mozilla-monitor
        style: row
        columns: 3
      Coming Soon:
        tab: 🚀 Coming Soon
        icon: mdi-rocket-launch
        style: row
        columns: 4

  bookmarks.yaml: |
    - Quick Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/mysweetpea
        - ArgoCD:
            - abbr: AR
              href: http://192.168.20.220
        - Traefik:
            - abbr: TR
              href: http://192.168.20.210:8080
        - Uptime Kuma:
            - abbr: UK
              href: http://192.168.20.217:3001
    - Resources:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/
        - Helm Docs:
            - abbr: HL
              href: https://helm.sh/docs/

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  widgets.yaml: |
    - resources:
        backend: resources
        cpu: true
        memory: true
        expanded: true
        disk: /
    - search:
        provider: duckduckgo
        target: _blank
        focus: false

  custom.css: |
    :root {
      --gold: #d4af37;
      --gold-light: #f0c75e;
      --gold-dark: #b8941f;
      --border: rgba(212, 175, 55, 0.18);
      --border-hover: rgba(212, 175, 55, 0.5);
      --bg: #050505;
      --card-bg: rgba(18, 18, 18, 0.76);
    }

    html, body, #__next, #page_wrapper, #inner_wrapper, .container {
      background-color: var(--bg) !important;
      background-image: none !important;
      color: #f0f0f0 !important;
    }

    /* Falling petals canvas - background layer */
    #petal-canvas {
      position: fixed !important;
      inset: 0 !important;
      z-index: 0 !important;
      pointer-events: none !important;
    }

    /* Hide default header & tabs */
    .header { display: none !important; }
    #tabs {
      position: fixed !important;
      top: -100px !important;
      left: -100px !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
      overflow: hidden !important;
      z-index: -1 !important;
    }

    /* Top info bar */
    #information-widgets {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 10001 !important;
      background: rgba(5, 5, 5, 0.85) !important;
      backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 10px 28px !important;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    body.service-active #information-widgets {
      opacity: 0 !important;
      transform: translateY(-100%);
      pointer-events: none !important;
    }

    .container {
      padding-top: 72px !important;
      position: relative;
      z-index: 1;
    }

    body.service-active .container {
      padding-top: 0 !important;
      min-height: 100vh !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
    }

    body.service-active .bookmark-group,
    body.service-active #footer {
      display: none !important;
    }

    /* Service cards */
    .service-card {
      background: var(--card-bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 16px !important;
      transition: all 0.3s ease !important;
      backdrop-filter: blur(8px) !important;
    }

    .service-card:hover {
      transform: translateY(-5px) !important;
      border-color: var(--border-hover) !important;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 30px rgba(212,175,55,0.1) !important;
    }

    .service-group-name {
      color: var(--gold-dark) !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
    }

    /* Branch overlay */
    #branch-overlay {
      position: fixed !important;
      inset: 0 !important;
      z-index: 9999 !important;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(212, 175, 55, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 85%, rgba(212, 175, 55, 0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 85% 15%, rgba(212, 175, 55, 0.06) 0%, transparent 40%),
        var(--bg) !important;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
    }

    #branch-overlay.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    #branch-content {
      position: relative;
      width: 100%;
      max-width: 1400px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #branch-center {
      position: relative;
      width: 760px;
      height: 760px;
    }

    #branch-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 3;
      animation: logo-entrance 1s ease forwards;
    }

    #branch-logo img {
      max-width: 420px;
      max-height: 420px;
      animation: pulse-gold 6s ease-in-out infinite;
    }

    #branch-logo-fallback {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-shadow: 0 0 60px rgba(212,175,55,0.5);
      display: none;
    }

    @keyframes logo-entrance {
      0% { opacity: 0; transform: translate(-50%, -55%) scale(0.92); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes pulse-gold {
      0%, 100% { filter: drop-shadow(0 0 45px rgba(212,175,55,0.45)); }
      50% { filter: drop-shadow(0 0 80px rgba(212,175,55,0.75)); }
    }

    /* Dynamic vine SVG */
    #branch-vines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
    }

    .branch-line {
      fill: none;
      stroke: var(--gold-dark);
      stroke-width: 1.2;
      stroke-linecap: round;
      opacity: 0.45;
      transition: all 0.3s ease;
    }

    .branch-btn-wrapper:hover ~ #branch-vines .branch-line,
    #branch-vines:has(+ * .branch-btn-wrapper:hover) .branch-line {
      opacity: 0.45;
    }

    .branch-btn-wrapper:hover .branch-line-target {
      stroke: var(--gold) !important;
      opacity: 0.85 !important;
      filter: drop-shadow(0 0 8px rgba(212,175,55,0.5));
    }

    /* Buttons placed around logo by JS */
    .branch-btn-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      opacity: 0;
      animation: fade-in-btn 0.6s ease forwards;
    }

    @keyframes fade-in-btn {
      0% { opacity: 0; transform: translate(-50%, -45%); }
      100% { opacity: 1; transform: translate(-50%, -50%); }
    }

    .branch-btn {
      background: rgba(10, 10, 10, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 36px;
      color: #a8a8a8;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .branch-btn:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--border-hover);
      color: var(--gold-light);
      box-shadow: 0 0 35px rgba(212,175,55,0.2);
      transform: scale(1.05);
    }

    #back-btn {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 10000;
      background: rgba(10, 10, 10, 0.9);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 22px;
      color: #a8a8a8;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      opacity: 0;
    }

    #back-btn.visible {
      display: block;
      opacity: 1;
    }

    #back-btn:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--border-hover);
      color: var(--gold-light);
    }

    /* Mobile */
    @media (max-width: 768px) {
      #branch-center {
        width: 100%;
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 40px 20px;
      }

      #branch-logo {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
        margin-bottom: 10px;
        animation: none;
      }

      #branch-logo img { max-height: 180px; }

      .branch-btn-wrapper {
        position: relative !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
        width: 80%;
        animation: fade-in-btn-mobile 0.5s ease forwards;
      }

      @keyframes fade-in-btn-mobile {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      #branch-vines { display: none; }

      .container { padding-top: 60px !important; }
    }

  custom.js: |
    (function() {
      'use strict';

      var initialized = false;

      function log(msg) {
        console.log('[SweetPea Homepage]', msg);
      }

      function waitForHomepage(callback, attempts) {
        attempts = attempts || 0;
        if (document.querySelector('.container')) {
          callback();
        } else if (attempts < 50) {
          setTimeout(function() { waitForHomepage(callback, attempts + 1); }, 100);
        } else {
          log('ERROR: Homepage container never appeared');
        }
      }

      function init() {
        if (initialized) return;
        initialized = true;
        log('Starting initialization');

        // Hide default header
        var header = document.querySelector('.header');
        if (header) header.style.display = 'none';

        // 1. Falling petals background canvas
        var canvas = document.createElement('canvas');
        canvas.id = 'petal-canvas';
        document.body.prepend(canvas);
        var ctx = canvas.getContext('2d');

        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        var petals = [];
        var count = Math.min(70, Math.max(30, Math.floor((canvas.width * canvas.height) / 50000)));
        for (var i = 0; i < count; i++) {
          petals.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 6 + 3,
            speedY: Math.random() * 1.0 + 0.3,
            speedX: (Math.random() - 0.5) * 0.6,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.025,
            opacity: Math.random() * 0.35 + 0.15,
            sway: Math.random() * 0.02 + 0.005,
            swayOffset: Math.random() * Math.PI * 2
          });
        }
        log('Created ' + count + ' petals');

        var frame = 0;
        function animatePetals() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          frame++;
          for (var i = 0; i < petals.length; i++) {
            var p = petals[i];
            p.y += p.speedY;
            p.x += p.speedX + Math.sin(frame * p.sway + p.swayOffset) * 0.4;
            p.rotation += p.rotationSpeed;

            if (p.y > canvas.height + 30) {
              p.y = -30;
              p.x = Math.random() * canvas.width;
            }
            if (p.x < -30) p.x = canvas.width + 30;
            if (p.x > canvas.width + 30) p.x = -30;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = '#d4af37';
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
          requestAnimationFrame(animatePetals);
        }
        animatePetals();

        // 2. Build branch overlay
        var overlay = document.createElement('div');
        overlay.id = 'branch-overlay';

        overlay.innerHTML =
          '<div id="branch-content">' +
            '<svg id="branch-vines" xmlns="http://www.w3.org/2000/svg"></svg>' +
            '<div id="branch-center">' +
              '<div id="branch-logo">' +
                '<img src="/logo.svg" alt="SweetPea" id="branch-logo-img">' +
                '<div id="branch-logo-fallback">SWEETPEA</div>' +
              '</div>' +
              // Tab indices: Public=0, Media=1, Private=2, System=3, Coming Soon=4
              '<div class="branch-btn-wrapper" data-tab-index="0" data-angle="45" style="animation-delay:1.2s"><button class="branch-btn">Public</button></div>' +
              '<div class="branch-btn-wrapper" data-tab-index="1" data-angle="180" style="animation-delay:1.35s"><button class="branch-btn">Media</button></div>' +
              '<div class="branch-btn-wrapper" data-tab-index="2" data-angle="135" style="animation-delay:1.5s"><button class="branch-btn">Private</button></div>' +
              '<div class="branch-btn-wrapper" data-tab-index="3" data-angle="225" style="animation-delay:1.65s"><button class="branch-btn">System</button></div>' +
              '<div class="branch-btn-wrapper" data-tab-index="4" data-angle="315" style="animation-delay:1.8s"><button class="branch-btn">Coming Soon</button></div>' +
            '</div>' +
          '</div>';
        document.body.appendChild(overlay);
        log('Overlay appended to body');

        // Logo fallback
        var logoImg = document.getElementById('branch-logo-img');
        if (logoImg) {
          logoImg.addEventListener('error', function() {
            log('Logo image failed to load, showing fallback text');
            logoImg.style.display = 'none';
            var fallback = document.getElementById('branch-logo-fallback');
            if (fallback) fallback.style.display = 'block';
          });
        }

        // Position buttons in a circle around the logo
        var center = document.getElementById('branch-center');
        var wrappers = overlay.querySelectorAll('.branch-btn-wrapper');
        var radius = 300; // distance from logo center to button center

        function positionButtons() {
          var rect = center.getBoundingClientRect();
          var cx = rect.width / 2;
          var cy = rect.height / 2;
          wrappers.forEach(function(wrapper) {
            var angle = parseFloat(wrapper.dataset.angle) * Math.PI / 180;
            var x = cx + radius * Math.cos(angle);
            var y = cy + radius * Math.sin(angle);
            wrapper.style.left = x + 'px';
            wrapper.style.top = y + 'px';
          });
        }
        positionButtons();

        // 3. Draw vines dynamically from logo to each button
        function drawVines() {
          var svg = document.getElementById('branch-vines');
          var logo = document.getElementById('branch-logo');
          if (!svg || !logo) return;

          var contentRect = document.getElementById('branch-content').getBoundingClientRect();
          var logoRect = logo.getBoundingClientRect();
          var cx = logoRect.left + logoRect.width / 2 - contentRect.left;
          var cy = logoRect.top + logoRect.height / 2 - contentRect.top;

          var paths = '';
          wrappers.forEach(function(wrapper, idx) {
            var rect = wrapper.getBoundingClientRect();
            var bx = rect.left + rect.width / 2 - contentRect.left;
            var by = rect.top + rect.height / 2 - contentRect.top;

            // Organic quadratic curve with slight perpendicular offset
            var mx = (cx + bx) / 2 + (by - cy) * 0.08;
            var my = (cy + by) / 2 + (cx - bx) * 0.08;

            paths += '<path class="branch-line" data-line-index="' + idx + '" d="M' + cx.toFixed(1) + ',' + cy.toFixed(1) + ' Q' + mx.toFixed(1) + ',' + my.toFixed(1) + ' ' + bx.toFixed(1) + ',' + by.toFixed(1) + '" />';
          });

          svg.innerHTML = paths;
          log('Drew ' + wrappers.length + ' vines');
        }

        // Delay vine draw until layout settles
        setTimeout(function() {
          positionButtons();
          drawVines();
        }, 100);

        window.addEventListener('resize', function() {
          positionButtons();
          drawVines();
        });

        // 4. Back button
        var backBtn = document.createElement('button');
        backBtn.id = 'back-btn';
        backBtn.innerHTML = '← Back to Home';
        document.body.appendChild(backBtn);

        // 5. Button interactions
        wrappers.forEach(function(wrapper, idx) {
          var btn = wrapper.querySelector('.branch-btn');
          if (!btn) return;

          // Highlight vine on hover
          wrapper.addEventListener('mouseenter', function() {
            var line = document.querySelector('#branch-vines .branch-line[data-line-index="' + idx + '"]');
            if (line) {
              line.style.stroke = '#d4af37';
              line.style.opacity = '0.85';
              line.style.filter = 'drop-shadow(0 0 8px rgba(212,175,55,0.5))';
            }
          });
          wrapper.addEventListener('mouseleave', function() {
            var line = document.querySelector('#branch-vines .branch-line[data-line-index="' + idx + '"]');
            if (line) {
              line.style.stroke = '';
              line.style.opacity = '';
              line.style.filter = '';
            }
          });

          btn.addEventListener('click', function() {
            var tabIndex = parseInt(wrapper.dataset.tabIndex);
            var tabButtons = document.querySelectorAll('#tabs ul li button');
            log('Button clicked: tabIndex=' + tabIndex + ', found ' + tabButtons.length + ' tabs');
            if (tabButtons[tabIndex]) tabButtons[tabIndex].click();
            overlay.classList.add('hidden');
            document.body.classList.add('service-active');
            setTimeout(function() { backBtn.classList.add('visible'); }, 300);
            window.scrollTo(0, 0);
          });
        });

        // 6. Back button
        backBtn.addEventListener('click', function() {
          backBtn.classList.remove('visible');
          overlay.classList.remove('hidden');
          document.body.classList.remove('service-active');
          var tabButtons = document.querySelectorAll('#tabs ul li button');
          if (tabButtons[0]) tabButtons[0].click();
        });

        log('Initialization complete');
      }

      if (document.readyState === 'complete') {
        waitForHomepage(init);
      } else {
        window.addEventListener('load', function() { waitForHomepage(init); });
      }
    })();

  services.yaml: |
