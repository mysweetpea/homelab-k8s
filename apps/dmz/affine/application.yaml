apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: affine
  namespace: argocd
spec:
  destination:
    namespace: dmz
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/mysweetpea/homelab-k8s.git
    path: apps/dmz/affine
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
