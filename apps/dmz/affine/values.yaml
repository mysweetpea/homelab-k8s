controllers:
  main:
    initContainers:
      migrate:
        image:
          repository: ghcr.io/toeverything/affine
          tag: "stable"
          pullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - node ./scripts/self-host-predeploy.js
        env:
        - name: AFFINE_CONFIG_PATH
          value: /root/.affine/config
        - name: NODE_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: affine-secrets
              key: database-url
        - name: REDIS_SERVER_HOST
          value: redis-affine-master.private.svc.cluster.local
        - name: REDIS_SERVER_PORT
          value: "6379"
        - name: REDIS_SERVER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-affine
              key: redis-password
        - name: AFFINE_INDEXER_ENABLED
          value: "false"

    containers:
      main:
        image:
          repository: ghcr.io/toeverything/affine
          tag: "stable"
          pullPolicy: IfNotPresent
        env:
        - name: AFFINE_CONFIG_PATH
          value: /root/.affine/config
        - name: NODE_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: affine-secrets
              key: database-url
        - name: REDIS_SERVER_HOST
          value: redis-affine-master.private.svc.cluster.local
        - name: REDIS_SERVER_PORT
          value: "6379"
        - name: REDIS_SERVER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-affine
              key: redis-password
        - name: AFFINE_SERVER_HOST
          value: notes.mysweetpea.cc
        - name: AFFINE_SERVER_HTTPS
          value: "true"
        - name: AFFINE_INDEXER_ENABLED
          value: "false"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - name: OAUTH_OIDC_ISSUER
          value: "http://auth.mysweetpea.cc/application/o/affine"
          value: "https://auth.mysweetpea.cc/application/o/affine"
        - name: OAUTH_OIDC_CLIENT_ID
          value: "wnWQaSxzyuafhDDzklANZlrFkUP0pb32GX5Tsurb"
        - name: OAUTH_OIDC_CLIENT_SECRET
          value: "WJQt32b30KZcTVDefNKgv6M8B5jMj963WnBfBVtnWMcpbQ9hpMRgJJKyfVjDyJii7FcZf5OjiXW3PzniarIcUXsHbpOfekX49reeGC8WhzLCEB9Ok5Lq7tZfpxWH21DD"
        - name: OAUTH_OIDC_SCOPE
          value: "openid email profile offline_access"
        - name: OAUTH_OIDC_CLAIM_MAP_USERNAME
          value: "preferred_username"
        - name: OAUTH_OIDC_CLAIM_MAP_EMAIL
          value: "email"
        - name: OAUTH_OIDC_CLAIM_MAP_NAME
          value: "name"
        ports:
        - containerPort: 3010
          name: http
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/ready
                port: 3010
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/ready
                port: 3010
              initialDelaySeconds: 10

service:
  main:
    controller: main
    ports:
      http:
        port: 3010

ingress:
  main:
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
    - host: notes.mysweetpea.cc
      paths:
      - path: /
        pathType: Prefix
        service:
          identifier: main
          port: http

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    globalMounts:
    - path: /root/.affine/config
  uploads:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: longhorn
    globalMounts:
    - path: /root/.affine/storage
