---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared-egress
  namespace: dmz
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Egress
  egress:
    # Cloudflare Edge — public internet egress for QUIC tunnel connection
    # The existing allow-internet-egress policy in dmz already permits
    # egress to non-10.0.0.0/8 IPs. This policy adds explicit internal targets.
    
    # Traefik ingress controller (192.168.20.210:80)
    - to:
        - ipBlock:
            cidr: 192.168.20.210/32
      ports:
        - protocol: TCP
          port: 80
    # n8n MetalLB (192.168.20.213:5678)
    - to:
        - ipBlock:
            cidr: 192.168.20.213/32
      ports:
        - protocol: TCP
          port: 5678
    # kube-dns (kube-system namespace, port 53)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
