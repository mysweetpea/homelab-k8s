apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: element-web
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: elementweb=docker.io/vectorim/element-web
    argocd-image-updater.argoproj.io/elementweb.update-strategy: semver
    argocd-image-updater.argoproj.io/elementweb.helm.image-spec: controllers.main.containers.main.image
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: dmz
  sources:
  - repoURL: https://ananace.gitlab.io/charts
    chart: element-web
    targetRevision: 1.4.37
    helm:
      valueFiles:
      - $values/apps/dmz/element-web/values.yaml
  - repoURL: https://github.com/mysweetpea/homelab-k8s.git
    targetRevision: HEAD
    ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
