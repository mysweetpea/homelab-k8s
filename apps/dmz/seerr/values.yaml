controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/fallenbagel/jellyseerr
          tag: latest
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
    pod:
      securityContext:
        fsGroup: 1000
    type: deployment
persistence:
  config:
    accessMode: ReadWriteOnce
    enabled: true
    globalMounts:
    - path: /app/config
    size: 5Gi
    storageClass: longhorn
    type: persistentVolumeClaim
service:
  main:
    controller: main
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.20.228"
    allocateLoadBalancerNodePorts: false
    ports:
      http:
        port: 5055
