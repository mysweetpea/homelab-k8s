controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: preview-new-oidc
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
    pod:
      securityContext:
        fsGroup: 1000
      nodeSelector:
        kubernetes.io/hostname: k3s-master
    type: deployment
persistence:
  config:
    accessMode: ReadWriteOnce
    enabled: true
    globalMounts:
    - path: /app/config
    size: 5Gi
    storageClass: longhorn
    type: persistentVolumeClaim
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 5055
