apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix-synapse
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mysweetpea/homelab-k8s
    targetRevision: HEAD
    path: apps/dmz/matrix-synapse/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: dmz
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
