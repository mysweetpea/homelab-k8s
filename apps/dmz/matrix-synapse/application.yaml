apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix-synapse
  namespace: argocd
spec:
  destination:
    namespace: dmz
    server: https://kubernetes.default.svc
  project: default
  sources:
    - repoURL: https://ananace.gitlab.io/charts
      chart: matrix-synapse
      targetRevision: "3.12.30"
      helm:
        values: |
          serverName: mysweetpea.cc
          publicServerName: matrix.mysweetpea.cc
          wellknown:
            enabled: true
          ingress:
            enabled: false
          postgresql:
            enabled: true
            auth:
              password: synapse
              username: synapse
              database: synapse
          redis:
            enabled: true
            password: synapse-redis-2026
          extraConfig:
            max_upload_size: 50M
            public_baseurl: "https://matrix.mysweetpea.cc/"
            # --- OIDC Configuration (Authentik) ---
            oidc_providers:
              - idp_id: authentik
                idp_name: authentik
                discover: true
                backchannel_logout_enabled: true
                issuer: "http://auth.mysweetpea.cc/application/o/matrix-synapse/"
                client_id: "OOCZ9OYQ4NknTxzzT2MzZBzEXDBs1bYrgvootaaw"
                client_secret: "NsJiUBmCydpNU1fi4MIWUtYKysb4JJnsRxsPWMOPEkF2zRS9Vc8dMbhovkoP6FqVFjCgYODvrPtPwwy4L128s9cZ95o5pzkgVV5TAVrcbKRvqLNrelgRMZz4JhA5A2KM"
                scopes:
                  - "openid"
                  - "profile"
                  - "email"
                user_mapping_provider:
                  config:
                    localpart_template: "{{ user.preferred_username }}"
                    display_name_template: "{{ user.preferred_username|capitalize }}"
            # --- Disable password login ---
            password_config:
              enabled: false
            # --- Disable registration ---
            enable_registration: false
            # --- JWT config for backchannel logout ---
            jwt_config:
              enabled: true
              secret: "NsJiUBmCydpNU1fi4MIWUtYKysb4JJnsRxsPWMOPEkF2zRS9Vc8dMbhovkoP6FqVFjCgYODvrPtPwwy4L128s9cZ95o5pzkgVV5TAVrcbKRvqLNrelgRMZz4JhA5A2KM"
              algorithm: "RS256"
    - repoURL: https://github.com/mysweetpea/homelab-k8s.git
      path: apps/dmz/matrix-synapse
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
