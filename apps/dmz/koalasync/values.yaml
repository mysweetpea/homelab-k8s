---
controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/shik3i/koalasync
          tag: latest
        env:
          PORT: "3000"
          MIN_VERSION: "1.0.0"
          MAX_ROOMS: "100"
          MAX_PEERS_PER_ROOM: "50"
          DEBUG_LOGGING: "0"
        envFrom:
          - secretRef:
              name: koalasync-secrets
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 15
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 5
    type: deployment
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 3000
