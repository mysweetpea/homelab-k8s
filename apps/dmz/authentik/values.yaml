---
authentik:
  image:
    repository: ghcr.io/goauthentik/server
    tag: "2026.5.2"
  secret_key:
    existingSecret: authentik-secret
    secretKey: secret_key
  postgresql:
    enabled: true
    image:
      tag: "17.4.0-debian-12-r0"
    auth:
      username: authentik
      database: authentik
      existingSecret: authentik-postgresql
      secretKeys:
        userPasswordKey: password
        adminPasswordKey: postgres-password
    primary:
      persistence:
        enabled: true
        storageClass: longhorn
        size: 8Gi
  redis:
    enabled: true
    architecture: standalone
    auth:
      enabled: false
  server:
    ingress:
      enabled: false
    metrics:
      enabled: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
  worker:
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
