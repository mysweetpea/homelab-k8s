---
# Vaultwarden — vault.mysweetpea.cc
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vaultwarden
  namespace: dmz
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`vault.mysweetpea.duckdns.org`) || Host(`vault.mysweetpea.cc`)
      kind: Rule
      services:
        - name: vaultwarden
          port: 80
---
